function calcBSA(w,h){return(w>0&&h>0)?Math.sqrt((h*w)/3600):0}
function cMg(d,w,b){if(d.type==="fixed")return d.fixed!=null?{lo:d.fixed,u:d.u}:null;if(d.type==="perKg"&&w>0)return{lo:d.val*w,hi:d.valHi?d.valHi*w:null,u:d.u};if(d.type==="perBSA"&&b>0)return{lo:d.val*b,u:d.u};if(d.type==="infusion")return{lo:d.val,hi:d.valHi,u:d.u,isR:1};return null}
function mS(r){if(!r)return"—";if(r.isR)return r.hi?`${r.lo}–${r.hi} ${r.u}`:`${r.lo} ${r.u}`;return r.hi?`${fmt(r.lo)}–${fmt(r.hi)} ${r.u}`:`${fmt(r.lo)} ${r.u}`}
function mL(r,c){if(!r||!c||r.isR)return null;const l=r.lo/c,h=r.hi?r.hi/c:null;return h?`${rML(l)}–${rML(h)} mL`:`${rML(l)} mL`}
function rT(ts,mg){if(!ts||!mg||mg<=0||typeof ts[0]!=="number")return null;let b=ts[0];for(const t of[...ts].sort((a,c)=>a-c))if(t<=mg*1.15)b=t;return b}

// ── PRACTICAL TAB FRACTION ENGINE ──
// Practical fracs: prefer ¼,½,¾,1,1½,2 over ⅓,⅔ (penalty 0.08 for impractical)
const FRACS=[
  {v:0.25,l:"¼ tab",p:0},{v:1/3,l:"⅓ tab",p:0.08},{v:0.5,l:"½ tab",p:0},
  {v:2/3,l:"⅔ tab",p:0.08},{v:0.75,l:"¾ tab",p:0.02},{v:1,l:"1 tab",p:0},
  {v:1.25,l:"1¼ tabs",p:0.02},{v:1.5,l:"1½ tabs",p:0},{v:2,l:"2 tabs",p:0},{v:3,l:"3 tabs",p:0}
];
function bestTab(targetMg,tabs){
  if(!tabs||!targetMg||targetMg<=0)return null;
  const numTabs=tabs.filter(t=>typeof t==="number").sort((a,b)=>a-b);
  if(!numTabs.length)return null;
  let best=null;
  for(const tab of numTabs){
    for(const fr of FRACS){
      const actual=tab*fr.v;const rawDiff=Math.abs(actual-targetMg)/targetMg;
      const score=rawDiff+(fr.p||0); // penalize impractical fractions
      if(rawDiff<0.3&&(!best||score<best.score))
        best={tab,frac:fr,actual,diff:rawDiff,score,label:`${fr.l}`,str:`${tab}`};
    }
  }
  return best;
}

// ── RX GENERATOR — PRACTICAL FRACTIONS, ADULT CAPS, BAND DOSING ──
function genRx(drug,w,syrup){
  const rx=drug.rx;if(!rx)return null;
  if(rx.rxLine)return{line:rx.rxLine,dil:null,note:rx.note};
  if(rx.isInf)return null; // handled by rxLine
  const p=drug.prep;
  let perDoseMg=rx.fixed||(rx.dose?rx.dose*w:null);
  if(!perDoseMg)return null;
  const unit=rx.unit||"mg";const freq=rx.freq||"";

  // Adult cap >40kg
  if(rx.adultMax&&w>=40&&perDoseMg>rx.adultMax){
    perDoseMg=rx.adultMax;
    // If overMax line available (e.g. Dytor for furo)
    if(rx.overMax)return{line:rx.overMax,dil:null,note:rx.note};
  }
  // If still over adultMax after cap + overMax exists
  if(rx.overMax&&perDoseMg>rx.adultMax)return{line:rx.overMax,dil:null,note:rx.note};

  // Band dosing (VYMADA, Bosentan)
  if(rx.bandDose&&rx.bands){
    for(const b of rx.bands){
      if(w<=b.maxWt){
        if(b.useDil&&syrup&&p&&p.conc){
          const mlV=rML(perDoseMg/p.conc);
          return{line:`${rx.tn} — ${mlV} mL ${freq}`,dil:rx.dil,note:rx.note};
        }
        if(b.line)return{line:b.line,dil:null,note:rx.note};
      }
    }
  }

  // Shelcal tab switch >20kg
  if(rx.tabSwitch&&w>=rx.tabSwitch&&rx.tabLine)return{line:rx.tabLine,dil:null,note:rx.note};

  // forceML: show syrup mL even for 10-20kg (e.g. Shelcal)
  if(rx.forceML&&rx.sypConc&&w<(rx.tabSwitch||999)){
    const mlV=rML(perDoseMg/rx.sypConc);
    return{line:`Syp ${rx.tn} (${rx.str||""}) — ${mlV} mL ${freq}`,dil:null,note:rx.note};
  }

  // <10kg: syrup/dilution
  if(syrup&&p&&(p.type==="liquid"||p.type==="dilute")&&p.conc){
    const conc=rx.sypConc||p.conc;
    const mlV=rML(perDoseMg/conc);
    if(p.type==="liquid"){
      const lbl=rx.form==="Drops"?`${rx.tn} drops`:`Syp ${rx.tn}`;
      return{line:`${lbl} (${rx.str||""}) — ${mlV} mL ${freq}`,dil:null,note:rx.note};
    }
    return{line:`${rx.tn} — ${mlV} mL orally ${freq}`,dil:rx.dil||`Crush ${p.tabBrand} in ${p.vol}mL NS`,note:rx.note};
  }

  // wholeTab: nearest single tab (aspirin ARF)
  if(rx.wholeTab&&drug.tabs){
    const sorted=drug.tabs.filter(t=>typeof t==="number").sort((a,b)=>a-b);
    let best=sorted[0],bestD=Math.abs(perDoseMg-sorted[0]);
    for(const t of sorted){const d=Math.abs(perDoseMg-t);if(d<bestD){bestD=d;best=t}}
    return{line:`Tab ${rx.tn} ${best}mg — 1 tab ${freq}`,dil:null,note:rx.note};
  }

  // ≥10kg: practical tab fraction
  if(drug.tabs&&drug.tabs.some(t=>typeof t==="number")){
    const tn=rx.tabTn||rx.tn;
    // Special: Digon tab is 0.25mg, dose in mcg → convert
    let targetForTab=perDoseMg;
    if(unit==="mcg"&&drug.tabs.some(t=>t<1)){targetForTab=perDoseMg/1000;} // mcg→mg for 0.25mg tab
    const bt=bestTab(targetForTab,drug.tabs.filter(t=>typeof t==="number"));
    if(bt){
      const str=unit==="mcg"?`${bt.tab*1000}mcg`:`${bt.tab}mg`;
      return{line:`Tab ${tn} ${bt.str}${unit==="mcg"?"mg":"mg"} — ${bt.label} ${freq}`,dil:null,note:rx.note};
    }
    // fallback: just show dose
    return{line:`Tab ${tn} — ${fmt(perDoseMg)} ${unit} ${freq}`,dil:null,note:rx.note};
  }

  // Injection or other
  const form=rx.form||"";const tn=rx.tabTn||rx.tn;const str=rx.tabStr||rx.str||"";
  return{line:`${form} ${tn} ${str} — ${fmt(perDoseMg)} ${unit} ${freq}`,dil:null,note:rx.note};
}

  const hasRx=selectedDrugs.length>0&&(weight>0||isFetal);
  useEffect(()=>{setSel({});setExp(null)},[cat,opd]);
  useEffect(()=>{const c=e=>{if(dropRef.current&&!dropRef.current.contains(e.target))setDropOpen(false)};document.addEventListener("mousedown",c);return()=>document.removeEventListener("mousedown",c)},[]);

  const C={bg:"#0B1929",card:"#0F2236",on:"#0D2A45",bdr:"#1A3A5C",act:"#1565C0",acc:"#42A5F5",dose:"#4FC3F7",dim:"#5A7A96",wh:"#EEF2F6",grn:"#76FF03",ylw:"#FFD54F",prp:"#B39DDB",ml:"#76FF03",freq:"#FFB74D"};

  return(<div style={{minHeight:"100vh",background:C.bg,color:"#C8D8E8",fontFamily:M.sans,display:"flex",flexDirection:"column"}}>
    <div style={{background:"#0D2137",borderBottom:`1px solid ${C.bdr}`,padding:"6px 10px",position:"sticky",top:0,zIndex:100}}>
      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:24,height:24,borderRadius:4,background:C.act,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:10,color:"#fff"}}>Rx</div><b style={{fontSize:12,color:"#fff"}}>PedCard</b></div>
        <div style={{display:"flex",alignItems:"center",gap:2,background:"#0A1929",border:`1px solid ${C.bdr}`,borderRadius:4,padding:"2px 5px"}}><span style={{fontSize:8,color:C.dim}}>WT</span><input type="number" inputMode="decimal" value={wt} onChange={e=>setWt(e.target.value)} placeholder="kg" style={{width:45,background:"transparent",border:"none",color:C.wh,fontSize:14,fontWeight:700,fontFamily:M.mono,outline:"none"}}/><span style={{fontSize:9,color:C.dim}}>kg</span></div>
        {(showHt||needsBSA)?(<div style={{display:"flex",alignItems:"center",gap:2,background:"#0A1929",border:`1px solid ${C.bdr}`,borderRadius:4,padding:"2px 5px"}}><span style={{fontSize:8,color:C.dim}}>HT</span><input type="number" inputMode="decimal" value={ht} onChange={e=>setHt(e.target.value)} placeholder="cm" style={{width:38,background:"transparent",border:"none",color:C.wh,fontSize:14,fontWeight:700,fontFamily:M.mono,outline:"none"}}/><span style={{fontSize:9,color:C.dim}}>cm</span></div>):(<div onClick={()=>setShowHt(true)} style={{fontSize:9,color:C.acc,cursor:"pointer",padding:"3px 5px",background:"#0A1929",borderRadius:3}}>+Ht</div>)}
        {bsa>0&&<span style={{fontSize:10,color:C.dose,fontFamily:M.mono}}>BSA{bsa.toFixed(2)}</span>}
        <div onClick={()=>setOpd(!opd)} style={{display:"flex",alignItems:"center",gap:3,cursor:"pointer",padding:"2px 6px",background:opd?"#1B5E20":"#0A1929",border:`1px solid ${opd?"#4CAF50":C.bdr}`,borderRadius:4}}><div style={{width:22,height:12,borderRadius:6,background:opd?"#4CAF50":"#1E3A54",display:"flex",alignItems:"center",padding:1}}><div style={{width:8,height:8,borderRadius:4,background:"#fff",transform:opd?"translateX(10px)":"",transition:"0.1s"}}/></div><span style={{fontSize:9,color:opd?C.grn:C.dim,fontWeight:600}}>OPD</span></div>
      </div>
      <div ref={dropRef} style={{marginTop:5,position:"relative"}}>
        <div onClick={()=>setDropOpen(!dropOpen)} style={{padding:"5px 10px",background:cat?"#0D2A45":"#0A1929",border:`1px solid ${cat?C.act:C.bdr}`,borderRadius:5,cursor:"pointer",fontSize:12,color:cat?"#fff":C.dim,display:"flex",justifyContent:"space-between"}}><span>{cat?`${DB[cat].icon} ${DB[cat].title}`:"▼ Select Condition"}</span><span style={{fontSize:9}}>{dropOpen?"▲":"▼"}</span></div>
        {dropOpen&&<div style={{position:"absolute",left:0,right:0,marginTop:2,background:"#0D2137",border:`1px solid ${C.bdr}`,borderRadius:6,boxShadow:"0 8px 32px rgba(0,0,0,0.6)",maxHeight:300,overflowY:"auto",zIndex:200}}>{CATS.map(k=><div key={k} onClick={()=>{setCat(k);setDropOpen(false)}} style={{padding:"8px 12px",cursor:"pointer",fontSize:12,color:cat===k?"#fff":"#C8D8E8",background:cat===k?C.act:"transparent",borderBottom:"1px solid #132F4C"}} onMouseEnter={e=>{if(cat!==k)e.currentTarget.style.background="#132F4C"}} onMouseLeave={e=>{if(cat!==k)e.currentTarget.style.background="transparent"}}>{DB[k].icon} {DB[k].title}</div>)}</div>}
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"6px 10px",maxWidth:880,margin:"0 auto",width:"100%"}}>
      {!cat?(<div style={{textAlign:"center",marginTop:40}}><div style={{fontSize:32,opacity:0.15}}>💊</div><div style={{fontSize:13,color:C.dim,marginTop:6}}>Enter weight → Select condition → Toggle drugs</div></div>):(
        <>
          {isFetal&&<div style={{padding:"4px 8px",background:"#1A1A0A",border:"1px solid #4A4A20",borderRadius:4,fontSize:10,color:C.ylw,marginBottom:5}}>ℹ Fetal: maternal protocols</div>}
          {!isFetal&&weight<=0&&<div style={{padding:"4px 8px",background:"#1A0A0A",border:"1px solid #4A2020",borderRadius:4,fontSize:10,color:"#EF5350",marginBottom:5}}>⚠ Enter weight</div>}
          {drugs.map((drug,idx)=>{
            const key=`${cat}-${idx}`;const on=!!sel[key];const isExp=exp===key;
            const p=drug.prep;const hasML=syrup&&p&&(p.type==="liquid"||p.type==="dilute")&&p.conc;
            const visD=opd?drug.d.filter(dd=>!dd.iv):drug.d;
            const firstPK=visD.find(dd=>dd.type==="perKg");
            const firstMg=firstPK&&weight>0?(firstPK.valHi||firstPK.val)*weight:0;
            const tabRec=(!syrup&&drug.tabs)?rT(drug.tabs,firstMg):null;
            return(<div key={key} style={{marginBottom:3,background:on?C.on:C.card,border:`1px solid ${on?C.act:C.bdr}`,borderRadius:6,overflow:"hidden"}}>
              <div style={{display:"flex",alignItems:"center",gap:6,padding:"5px 8px",cursor:"pointer"}}
                onClick={()=>setSel(pp=>({...pp,[key]:!pp[key]}))}>
                <div style={{width:30,height:15,borderRadius:8,background:on?C.act:"#1E3A54",display:"flex",alignItems:"center",padding:1,flexShrink:0}}><div style={{width:11,height:11,borderRadius:6,background:"#fff",transform:on?"translateX(15px)":"",transition:"0.1s"}}/></div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:600,color:on?C.wh:"#8FA8C0"}}>{drug.n} <span style={{fontWeight:400,fontSize:9,color:C.dim}}>({drug.brands.split(",")[0]})</span></div>
                  {on&&(weight>0||isFetal)&&!isExp&&(
                    <div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:1}}>
                      {visD.map((dose,di)=>{const r=cMg(dose,weight,bsa);const mg=mS(r);const mlV=hasML?mL(r,p.conc):null;
                        return(<span key={di} style={{fontSize:10}}>
                          {mlV&&<span style={{color:C.ml,fontFamily:M.mono,fontWeight:800,fontSize:12}}>{mlV} </span>}
                          <span style={{color:C.dose,fontFamily:M.mono,fontWeight:700,fontSize:mlV?10:12}}>{isFetal?dose.fr:mg}</span>
                          <span style={{color:C.freq,fontWeight:700,fontSize:10,background:"#2A1A00",padding:"0 3px",borderRadius:2,marginLeft:2}}>{dose.fr}</span>
                        </span>)
                      })}
                      {tabRec&&<span style={{fontSize:8,color:C.grn}}>💊{tabRec}mg</span>}
                    </div>)}
                </div>
                <div onClick={e=>{e.stopPropagation();setExp(isExp?null:key)}} style={{fontSize:9,color:C.acc,cursor:"pointer",padding:"1px 3px"}}>{isExp?"▲":"▼"}</div>
              </div>
              {isExp&&(<div style={{padding:"0 8px 6px",borderTop:`1px solid ${C.bdr}`}}>
                {hasML&&p.type==="dilute"&&<div style={{marginTop:5,padding:"5px 8px",background:"#0A2010",border:"1px solid #1B5E20",borderRadius:4,fontSize:11,color:C.grn}}>💧 <b>{p.tabBrand} in {p.vol}mL NS → {p.conc} {p.concU}</b>{p.note&&<span style={{color:"#A5D6A7"}}> | {p.note}</span>}</div>}
                {hasML&&p.type==="liquid"&&<div style={{marginTop:5,padding:"5px 8px",background:"#0A1A2A",border:`1px solid ${C.act}`,borderRadius:4,fontSize:11,color:C.acc}}>🧴 <b>{p.brand}</b> — {p.conc} {p.concU}</div>}
                {p&&p.type==="inj"&&p.note&&<div style={{marginTop:5,padding:"4px 8px",background:"#0F1A2A",border:"1px solid #2A4A6A",borderRadius:4,fontSize:10,color:"#90CAF9",whiteSpace:"pre-line"}}>💉 {p.note}</div>}
                {p&&p.type==="other"&&p.note&&<div style={{marginTop:5,padding:"4px 8px",background:"#1A1A0A",border:"1px solid #4A4A20",borderRadius:4,fontSize:10,color:C.ylw}}>ℹ {p.note}</div>}
                <div style={{marginTop:5}}>{visD.map((dose,di)=>{const r=cMg(dose,weight,bsa);const mg=mS(r);const mlV=hasML?mL(r,p.conc):null;
                  return(<div key={di} style={{padding:"3px 0",borderBottom:"1px solid #132F4C",display:"flex",flexWrap:"wrap",gap:4,alignItems:"baseline"}}>
                    <span style={{color:"#B0C4D8",fontWeight:600,fontSize:11,minWidth:50}}>{dose.lb}</span>
                    {mlV?(<><span style={{color:C.ml,fontFamily:M.mono,fontWeight:800,fontSize:13}}>→{mlV}</span><span style={{color:C.dim,fontSize:9}}>({mg})</span></>):(<span style={{color:C.dose,fontFamily:M.mono,fontWeight:700,fontSize:13}}>→{isFetal?dose.fr:mg}</span>)}
                    <span style={{color:C.freq,fontWeight:800,fontSize:11,background:"#2A1A00",padding:"1px 5px",borderRadius:3,marginLeft:"auto"}}>{dose.fr}</span>
                  </div>)})}</div>
                {tabRec&&<div style={{marginTop:3,fontSize:10,color:C.grn}}>💊 Use <b>{tabRec}mg</b> | {drug.tabs.join(",")}mg</div>}
                {!syrup&&p&&p.type==="dilute"&&<div style={{marginTop:3,fontSize:9,color:"#90CAF9"}}>For&lt;10kg: {p.tabBrand} in {p.vol}mL→{p.conc}{p.concU}</div>}
                <div style={{marginTop:3,padding:"3px 6px",background:"#0A1929",borderRadius:3,fontSize:10,display:"flex",flexWrap:"wrap",gap:6}}>
                  <span><span style={{color:C.dim}}>Dose: </span><span style={{color:C.dose,fontFamily:M.mono}}>{drug.perDay}</span></span>
                  {drug.mxD&&<span><span style={{color:C.dim}}>Max/dose: </span><span style={{color:"#EF9A9A"}}>{drug.mxD}</span></span>}
                  {drug.mxDay&&<span><span style={{color:C.dim}}>Max/day: </span><span style={{color:"#EF9A9A"}}>{drug.mxDay}</span></span>}
                </div>
                {drug.combos&&<div style={{marginTop:2,fontSize:10,color:C.prp}}>💊 {drug.combos}</div>}
                <div style={{marginTop:2,padding:"3px 6px",background:"#1A0A0A",border:"1px solid #3A1515",borderRadius:3,fontSize:9,color:"#EF9A9A"}}>⚠ {drug.w}</div>
              </div>)}
            </div>)
          })}
          {/* ══ PRESCRIPTION PAD ══ */}
          {hasRx&&(<div style={{marginTop:14,marginBottom:20}}>
            <div style={{background:"#FEFEFE",color:"#1a1a1a",borderRadius:6,padding:"16px 18px",fontFamily:"'Georgia','Times New Roman',serif",border:"2px solid #1565C0"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",borderBottom:"2px solid #333",paddingBottom:8,marginBottom:10}}>
                <div style={{fontSize:28,fontWeight:700,color:"#1565C0"}}>℞</div>
                <div style={{textAlign:"right",fontSize:11,color:"#555",lineHeight:1.6}}>
                  <div>Date: <b>{new Date().toLocaleDateString("en-IN")}</b></div>
                  <div>Weight: <b>{weight} kg</b></div>
                  {bsa>0&&<div>BSA: {bsa.toFixed(2)} m²</div>}
                </div>
              </div>
              <div style={{fontSize:13,fontWeight:700,color:"#333",marginBottom:12,textTransform:"uppercase",letterSpacing:0.5,borderBottom:"1px solid #eee",paddingBottom:6}}>{DB[cat].icon} {DB[cat].title}</div>
              <div style={{paddingLeft:2}}>
                {selectedDrugs.map((drug,si)=>{
                  const result=genRx(drug,weight,syrup);
                  if(!result)return null;
                  return(<div key={si} style={{marginBottom:10,paddingBottom:8,borderBottom:"1px dashed #ddd"}}>
                    <div style={{fontSize:13,color:"#1a1a1a",lineHeight:1.6}}>
                      <b style={{color:"#1565C0",fontSize:14,marginRight:6}}>{si+1}.</b>{result.line}
                    </div>
                    {result.dil&&<div style={{fontSize:10,color:"#666",marginLeft:20,marginTop:2,fontStyle:"italic"}}>Prep: {result.dil}</div>}
                    {result.note&&<div style={{fontSize:10,color:"#888",marginLeft:20,marginTop:1}}>{result.note}</div>}
                  </div>);
                })}
              </div>
              <div style={{marginTop:14,paddingTop:10,borderTop:"1px solid #ccc",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
                <div style={{fontSize:9,color:"#999",maxWidth:"55%",lineHeight:1.4}}>Starting doses. Uptitrate as tolerated.<br/>Review at follow-up.</div>
                <div style={{textAlign:"right"}}><div style={{borderTop:"1px solid #333",width:140,marginBottom:4}}/><div style={{fontSize:10,color:"#555"}}>Signature / Stamp</div></div>
              </div>
            </div>
          </div>)}
        </>
      )}
    </div>
    <div style={{background:"#0A1929",borderTop:`1px solid ${C.bdr}`,padding:"3px 10px",fontSize:8,color:"#3A5068",textAlign:"center"}}>AHA/ACC/ESC • PALS 2020 • PubMed. Verify all doses.</div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
