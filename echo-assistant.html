1. TOF → ICR (intracardiac repair) is the primary and preferred intervention. Age for ICR: ideally 6-18 months, weight >5kg preferred. If weight <4kg OR hypoplastic PAs (McGoon ratio <1.5 or Nakata index <150): palliative RVOT stenting first to promote PA growth → reassess for ICR at 6-12 months. BT shunt only as last resort if PAs too small/discontinuous for stenting. SpO2 <70% or severe hypercyanotic spells → urgent palliation regardless of age.
2. TGA with intact IVS → Arterial Switch Operation (ASO). URGENT — ideally within first 2 weeks of life before LV regresses. If age 2-4 weeks: urgent ASO still possible but assess LV mass. If age >4 weeks with regressed LV (LV:RV mass ratio <0.6, LV posterior wall stress high): LV retraining protocol (PA band + BT shunt) for 1-2 weeks then ASO — only feasible before 12 months. After 12 months with regressed LV: physiologic repair (Senning/Mustard). TGA with large VSD: can wait slightly longer (LV stays primed) — repair at 1-3 months with ICR.

CASE C: Transitional AVCD Rastelli Type-A. Age 4m 19d. Normal great arteries. Large primum ASD + high up secundum ASD + small inlet VSD. Moderate right AVVR, mild left AVVR. Dilated RA-RV. No PAH.
MANAGEMENT: Medical stabilization. Rationale: No PAH, mild-moderate AV valve regurgitation, adequate time window — plan elective repair at 4-6 months; medical stabilization now with diuretics if heart failure symptoms.

CASE D: Post-BDGS unbalanced AVSD. Age 8y 6m, SpO2 80%, Wt 18.9kg. Well-functioning right BDG. Unbalanced AVSD, aorta from MLV, hypoplastic RV, mild AVVR. Confluent branch PAs (LPA 12.2mm, RPA 11mm). Normal ventricular function. PA gradient 70mmHg (forward flow).
MANAGEMENT: Pre-Fontan cardiac catheterization followed by Fontan completion. Rationale: Good PA size, well-functioning BDG, adequate weight; PA pressures need catheter assessment before Fontan; if PA pressure acceptable (<15mmHg), proceed to Fontan completion.

CASE E: Truncus Arteriosus type I. Age 6m 18d, SpO2 82%, Wt 3.7kg. Large subtruncal VSD, LA+LV dilated, hyperkinetic PAH, mild truncal valve regurgitation, good biventricular function.
MANAGEMENT: Medical stabilization followed by truncal repair. Rationale: Hyperkinetic PAH (not obstructive — high flow), weight borderline at 3.7kg; medical stabilization (diuretics, NG feeds, optimize weight) then urgent truncal repair as delay worsens PAH irreversibly; target repair within 2-4 weeks.

CASE F: Ebstein anomaly severe form. Age 2y 2m, SpO2 82%, Wt 9.5kg. Severe Ebstein, plastered leaflets, small functional RV, hugely dilated RA, large atrialized RV, severe TR (RVSP 15mmHg), two small ASDs with R→L shunt, normal LV function, confluent branch PAs (7mm each).
MANAGEMENT: Ebstein repair + BDGS. Rationale: Severe Ebstein with small functional RV — single ventricle route with BDGS offloads right heart; concomitant TV repair at time of BDGS; R→L shunt at ASD confirms right heart pressure issue; good LV function and good PA size are prerequisites satisfied.

CASE G: Obstructed Supracardiac TAPVC. Age 1m 6d, SpO2 93%. All 4 PVs → common chamber → vertical vein (obstructed between LPA and left bronchus) → innominate → RSVC → RA. Gmax 29mmHg. Severe PAH. RA-RV dilated. Good biventricular function.
MANAGEMENT: Emergency TAPVC repair. Rationale: Obstruction is a surgical emergency regardless of age or weight — obstructed TAPVC has 100% mortality without surgery; SpO2 93% suggests partial compensation but obstruction will worsen; no delay.

CASE H: TOF near PA atresia + severe LPA origin stenosis. Age 9m 22d. Large conoventricular VSD, near-complete RVOT obstruction (MAP 2mm, PA annulus 3mm), confluent PAs with severe LPA origin stenosis (LPA origin 3mm, hilum 9mm), underfilled LV.
MANAGEMENT: ICR + LPA plasty. Rationale: Near-atresia morphology but confluent PAs present with adequate distal size; LPA origin stenosis requires simultaneous plasty at time of ICR; do not stage — complete repair with PA reconstruction.

CASE I: PA with Intact IVS + hypoplastic RV + PDA. Age 2d. Pulmonary atresia with intact IVS. Hypertrophied, hypoplastic bipartite RV. Hypoplastic TV (annulus 5mm). Bicuspid aortic valve. Small-moderate PDA with L→R shunt. Confluent PAs (4mm each).
MANAGEMENT: PGE1 infusion to maintain duct patency, then PDA stenting. Rationale: Duct-dependent pulmonary circulation; PGE1 keeps duct open urgently; PDA stenting preferred over BT shunt for initial palliation as it maintains duct and allows PA growth; hypoplastic RV with TV z-score severely negative — likely single ventricle pathway; reassess for BPV vs single ventricle palliation after PDA stenting.

CASE J: HLHS. Age 1d, SpO2 95%, Wt 2.7kg. Mitral atresia, intact IVS, aortic atresia, hypoplastic arch (ascending 4.5mm), restrictive PFO (mean gradient 6mmHg), moderate PDA with evolving restriction (gradient 28mmHg), bidirectional shunt, duct-dependent systemic circulation, severe PAH.
MANAGEMENT: CVTS (cardiac surgery) opinion followed by medical management vs Norwood Stage I operation. Rationale: HLHS with restrictive PFO and evolving PDA restriction is a clinical emergency — worsening systemic obstruction; PGE1 urgently to maintain PDA; Norwood Stage I (or hybrid procedure) is definitive; family counselling on prognosis and options required; CVTS multidisciplinary decision.

CASE K: Tricuspid Atresia + Dextrocardia + Transposed great arteries + Hyperkinetic PAH. Age 28d. Situs solitus, dextrocardia. Bilateral SVC, LSVC to coronary sinus. Tricuspid atresia, hypoplastic RV, large ASD R→L, non-restrictive bulboventricular foramen, D-posed great arteries, aorta from right-sided (morphological) ventricle. Hyperkinetic PAH. Good PA size.
MANAGEMENT: PA banding. Rationale: Tricuspid atresia with transposed GAs and hyperkinetic PAH — high pulmonary flow will cause irreversible PAH; PA banding urgently to protect pulmonary vasculature and prepare for univentricular palliation pathway (BDGS then Fontan); age too young and weight too small for BDGS now.

CASE L: Right Isomerism + Complete AVCD + DORV + PA atresia + PDA. Age 2d. Situs ambiguous (right isomerism), mid liver, common atrium, common AV valve. DORV, PA atresia, LV not routable to aorta. Confluent PAs with RPA origin stenosis (RPA origin 2.5mm). Large PDA from innominate artery (16mm length).
MANAGEMENT: PDA stenting. Rationale: PA atresia with duct-dependent pulmonary circulation; PDA stenting to maintain pulmonary flow and promote PA growth; right isomerism + unroutable anatomy = single ventricle palliation pathway; PDA stenting preferred over BT shunt given PDA anatomy (from innominate artery, good length); reassess PA growth and consider BDGS at 4-6 months.


CASE M: Coronary cameral fistula RCA to RV + Hyperkinetic PAH. Age 5m 17d, SpO2 99%, Wt 5.3kg. Large CCF from RCA to base of RV (entry 3.8mm), dilated RCA, pan-diastolic flow reversal, hyperkinetic PAH, dilated LA & LV, PFO.
MANAGEMENT: CT coronary angiogram followed by fistula device closure. Rationale: Large coronary fistula causing significant left heart volume overload (dilated LA+LV) and high pulmonary flow (hyperkinetic PAH); CTA required first to delineate fistula anatomy precisely before device closure; catheter-based device closure is first choice for RCA-to-RV fistula of this size.

CASE N: Holmes heart (DILV + NRGA) + Severe MR + Hyperkinetic PAH. Age 14d, SpO2 not stated. DILV, NRGA, large inlet VSD, severe MR due to deficient AML tissue, dysplastic MV, mild PS (25mmHg), hyperkinetic PAH, hypoplastic RV.
MANAGEMENT: PA banding + Atrial septectomy + Mitral valve obliteration. Rationale: DILV with hyperkinetic PAH — PA banding urgently to protect pulmonary vasculature (single ventricle pathway); severe MR from dysplastic MV causing left heart dilation — MV obliteration (not repair, not replacement in a neonate) removes the regurgitant orifice; atrial septectomy ensures unobstructed mixing; all three done simultaneously.

CASE O: {S,L,D} DILV + near-IAA type B + large PDA. Age 7d. L-looped ventricle, DILV, PA from LV, aorta from outlet chamber, hypoplastic left aortic arch nearly amounting to IAA type B, moderate-large PDA as DTA, large bulbo-ventricular foramen, small ASD.
MANAGEMENT: CT aortogram then arch repair + PA band. Rationale: Hypoplastic arch amounting to IAA requires CTA to plan arch reconstruction; PA band concurrent with arch repair to control pulmonary flow; PDA will be dealt with at time of arch surgery; single ventricle pathway — BDGS and Fontan later.

CASE P: DOLV + severe PS + bilateral SVC + smallish RV. Age 1d, normal SpO2. DOLV (PA committed to LV, aorta to both), bilateral SVC (LSVC to LA), large sub-aortic VSD, severe valvar+sub-valvar PS, side-by-side GAs (aorta right), smallish but adequate RV, small branch PAs (LPA 2.7mm, RPA 3.5mm).
MANAGEMENT: Medical stabilization. Rationale: Complex anatomy requiring detailed evaluation; neonatal age — needs weight gain before intervention; smallish branch PAs and severe PS but SpO2 acceptable; plan VSD routing + RVOT reconstruction when older and bigger; immediate surgery not indicated without haemodynamic compromise.

CASE Q: Anatomically corrected malposed GA (ACMGA) + {S,D,L} DORV + multiple VSDs + severe PS. Age 5m 7d, SpO2 99%, Wt 5.5kg. ACMGA, DORV with L-posed aorta, three VSDs (large inlet+subpulmonic, large subaortic, large muscular), severe valvular+subvalvar PS (Gmax 70mmHg), good antegrade PA flow, doming PV, good branch PAs (9mm each), normal biventricular function.
MANAGEMENT: Follow-up after 2 months, then plan VSD closure + RVOT resection + pulmonary valvotomy. Rationale: SpO2 99% and normal biventricular function — no haemodynamic compromise now; adequate PA size; good antegrade flow means PA growth will continue; elective complete repair planned: VSD closure (routing), RVOT resection, and pulmonary valvotomy at ~8 months age.

CASE R: Large PM VSD with STL restriction (overall small shunt) + severe sub-aortic membrane + AS + parachute MV. Age 1y 9m, SpO2 99%, Wt 8kg. VSD restricted to small overall shunt (Gmax 60mmHg), narrow LVOT from diffuse sub-aortic membrane, severe sub-valvular AS (Pg/Mg 100/50mmHg), tricuspid AV with NCC restricted mobility, mild-moderate AR, parachute MV with single papillary muscle, LSVC to roofed CS.
MANAGEMENT: LVOT resection + VSD closure +/- Aortic valve repair (surgical). Rationale: Severe LVOT obstruction from sub-aortic membrane is the primary indication — gradient 100mmHg causes progressive LV hypertrophy and AR; VSD closure simultaneous; aortic valve repair/replacement considered if AR progresses intraoperatively; parachute MV requires careful assessment — avoid inadvertently creating MV stenosis.

CASE S: CCTGA {I,D,D} Situs Inversus Dextrocardia + Severe TR systemic AV valve + Regressed MLV. Age 3y 6m, SpO2 98%, Wt 12.4kg. Situs inversus, dextrocardia, Cc-TGA (AV+VA discordance), intact IVS, severe TR from dilated annulus+non-coapting leaflets (VC 5.7mm), regressed MLV (left side = morphological LV, not the systemic ventricle).
MANAGEMENT: CVTS opinion for PA banding for TR. Rationale: In CCTGA without VSD, systemic RV (morphological RV on left side) is failing → severe TR from annular dilatation; TR gradient reflects systemic pressure NOT PAH; PA banding (LV training) is the strategy to retrain the morphological LV before double-switch operation; regressed MLV confirms urgent need for LV retraining; CVTS/surgical team must assess suitability for double-switch.

CASE T: Situs Solitus Dextrocardia + TASVC (total anomalous systemic venous connection) + TOF + PA + RPA origin stenosis. Age 8m 26d, SpO2 90%, Wt 6.3kg. Situs solitus dextrocardia, bilateral SVC all draining to left-sided atrium (TASVC), IVC to left atrium, TOF with pulmonary atresia, moderate-severe RPA origin stenosis (origin 2.5mm, hilum 6mm), LPA 11mm, moderate PDA from undersurface of arch, right aortic arch with mirror-image branching.
MANAGEMENT: CTPA followed by CVTS opinion for systemic venous re-routing + ICR + conduit + RPA plasty. Rationale: Complex anatomy — TASVC means all systemic veins go to wrong atrium; CTA/CTPA needed to map venous anatomy; surgical plan involves rerouting systemic veins + complete intracardiac repair of TOF + RV-PA conduit + RPA plasty; this is a major staged or combined operation requiring multidisciplinary planning.

CASE U: {S,L,D} DILV + L-looped + PS (Gmax 64mmHg) + increased Qp + balanced physiology. Age 2y 10m, SpO2 96%, Wt 10.5kg. DILV, L-looped ventricles, PA from MLV, aorta from outlet chamber, large bulbo-ventricular foramen, moderate-severe valvular PS (Gmax 64mmHg), overall increased Qp (confluent dilated branch PAs), normal ventricular function.
MANAGEMENT: Regular follow-up in view of balanced physiology and overall increased Qp. Rationale: DILV with PS creates a natural balance — PS limits pulmonary flow preventing PAH while maintaining adequate saturation; increased Qp but SpO2 96% means good mixing; no urgent intervention; close follow-up to watch for increasing PS (may reduce Qp too much) or worsening PAH; Fontan pathway planned long-term.

CASE V: Cc-TGA + Large Inlet VSD + Supra-tricuspid membrane + moderate-severe TR + moderate PS. Age 1y 7m, SpO2 96%, Wt 8kg. Cc-TGA (AV-VA discordance), L-looped ventricle, L-posed aorta, large inlet VSD with muscular extension, supra-tricuspid membrane (gradient 20/10mmHg), moderate-severe TR (tethered STL, hyperechoic chordae), moderate valvular PS (Gmax 55mmHg — partially flow related), tricuspid aortic+pulmonary valves, normal biventricular function.
MANAGEMENT: VSD surgical closure + Supra-tricuspid membrane resection + TV repair + Pulmonary valvotomy (physiological repair). Rationale: Cc-TGA with VSD and RVOTO — physiological repair (not anatomical/double-switch) chosen: VSD closure directs LV blood to PA, RV to aorta, accepting systemic RV permanently; supra-tricuspid membrane resection and TV repair address obstructions; PS (55mmHg partially flow-related) managed with valvotomy; good biventricular function makes repair feasible.

CASE W: Unobstructed TAPVC + DORV + Common AV valve + Interrupted IVC + Severe PAH + Smallish LV. Age 3m 7d, SpO2 92%. Unobstructed TAPVC (PVs to LA roof), interrupted IVC (azygos continuation presumed), DORV, common AV valve, LV not routable to aorta, smallish LV, severe PAH, grade II left AVVR + moderate right AVVR.
MANAGEMENT: Early PA banding, pre-op sedated echo to be done. Rationale: Severe PAH + unobstructed TAPVC — PA band urgently to control pulmonary flow before PAH becomes irreversible; smallish LV and LV-to-aorta not routable = single ventricle pathway; sedated echo needed for better anatomical delineation before definitive surgical plan; TAPVC repair + Kawashima/Fontan staged later.

CASE X: Small PDA (2.5mm) + Mild PAH + Severe LV Dysfunction. Age 6y 3m, SpO2 96%, Wt 8.7kg. Small PDA with L→R shunt (gradient 80/25mmHg), severe LV dysfunction (LVEF 34%, FS 17%), mild PAH (RVSP ~30mmHg), dilated LA & LV, mild MR, trivial TR.
MANAGEMENT: PDA device closure to reduce volume overload. Rationale: Even a small PDA causes continuous left heart volume overload; severe LV dysfunction (EF 34%) is the critical finding — PDA closure removes the volume load and allows LV recovery; mild PAH is reactive to high flow, not obstructive; device closure preferred over surgical; LV function must be monitored closely post-closure.

CASE Y: Unobstructed supracardiac TAPVC to SVC-RA junction + separate RUPV to mid-SVC. Age 1m 25d, SpO2 91%, Wt 5kg. All left PVs + RLPV → common chamber → SVC-RA junction. RUPV drains separately to mid-SVC. Moderate ASD with R→L shunt. Dilated RA-RV. Mild PAH.
MANAGEMENT: TAPVC repair. Rationale: Unobstructed TAPVC but SpO2 91% with R→L shunt at ASD — hemodynamically significant; complex drainage pattern (RUPV separate to mid-SVC) requires careful surgical planning; elective but timely repair before PAH progresses; both drainage sites must be addressed at surgery.

CASE Z: TOF with PA + LMCA-to-MPA coronary collateral + smallish LPA. Age 1y 9m, SpO2 75%, Wt 8.7kg. PA-VSD, confluent PAs (RPA 7.5mm, smallish LPA 6mm), moderate coronary collateral from LMCA to MPA, normal biventricular function. No PDA.
MANAGEMENT: CTPA followed by SANO shunt + coronary collateral ligation. Rationale: PA-VSD with coronary collateral — critical to ligate LMCA-MPA collateral at time of palliation as it causes coronary steal; CTPA maps PA and collateral anatomy; SANO shunt (RV-PA conduit) preferred over BT shunt for PA-VSD to avoid pulmonary overcirculation; once adequate PA growth confirmed, ICR planned.

CASE AA: Outlet VSD closed by RCC prolapse + RSOV to RV + Dilated LA & LV. Age 8y, SpO2 98%, Wt 17.3kg. Outlet VSD effectively closed by significant RCC prolapse (residual small-moderate shunt), small-moderate RSOV (ruptured sinus of Valsalva) to RV (Gmax 84mmHg), dilated LA & LV, trivial AR, mild TR, normal biventricular function, tiny PDA.
MANAGEMENT: RSOV repair + PDA ligation. Rationale: RSOV (ruptured right sinus of Valsalva) causes left-to-right shunt into RV leading to progressive LA+LV dilation; Gmax 84mmHg confirms large shunt volume; surgical repair of RSOV fistula + VSD closure (if residual) + PDA ligation; do not defer — continued volume overload will impair LV function.



CASE AB: D-TGA + multiple muscular VSDs + regressed LV + SpO2 66%. Age 5y, SpO2 66%, Wt unknown. D-TGA, VA discordance, D-looped, D-malposed GVs, small-moderate apical + mid muscular VSDs (bidirectional), IVS bowing into LVOT, regressed LV, RA-RV dilated, mild pericardial effusion.
MANAGEMENT: Urgent surgical consultation for ASO vs Senning. Rationale: SpO2 66% is critically low — immediate intervention needed; D-TGA with regressed LV at age 5y makes ASO high risk (LV may not support systemic circulation); VSDs may provide some mixing but inadequate; decision between ASO (with LV retraining impossible at age 5) vs Senning/Mustard (palliative but safer); CVTS multidisciplinary urgent discussion. Start PGE1 if not already on it.

CASE AC: Large conoventricular VSD + Absent pulmonary valve + Free PR + Absent LPA + Severe RPA origin stenosis. Age 19y 11m. Large CVT VSD, absent PV, free PR, MPA continues as RPA (unilateral), absent LPA, severe RPA origin stenosis (Gmax 90mmHg, origin 6mm), RA-RV dilated, normal biventricular function.
MANAGEMENT: VSD closure + PVR (pulmonary valve replacement) + RPA plasty (single lung circulation). Rationale: Absent pulmonary valve syndrome with absent LPA — essentially single-lung pulmonary circulation through RPA; free PR with only one PA causes progressive RV dilation; VSD closure + PVR (tissue valve) + RPA origin plasty to relieve severe stenosis; absent LPA is permanent — must inform patient of single-lung status; surgical team to plan carefully given unusual anatomy.

CASE AD: Structurally Normal Heart + Extra Hepatic CPSS. Age 7y 6m, SpO2 86%, Wt 20.8kg. Normal cardiac anatomy except mild LV dilatation, PFO. Extra-hepatic congenital portosystemic shunt (CPSS) from left renal vein to portal vein.
MANAGEMENT: High risk CPSS device closure trial. Rationale: CPSS causes portosystemic shunting → hyperammonemia, hepatic encephalopathy risk, pulmonary hypertension risk (liver bypassed); device closure of the shunt is treatment; "high risk" reflects risk of hepatic decompensation if portal pressure rises acutely after closure — test occlusion first; echo shows structurally normal heart so cardiac anatomy not the limiting factor.

CASE AE: Post PDA stenting (PA-IVS / bipartite RV) → BDGS. Age 9m 25d, SpO2 82%. Post PDA stenting (DES 3.5x15mm + 3.5x8mm), bipartite RV, biventricular hypertrophy, TV annulus 8mm (severely hypoplastic), PFO with R→L, confluent PAs (RPA 6mm, LPA 7mm), well-flowing PDA stent, pulsatile aorta.
MANAGEMENT: BDGS + Atrial septectomy + TAP (tricuspid annuloplasty) + PDA stent removal. Rationale: Post-PDA stenting for PA-IVS; PA growth has been achieved (LPA 7mm, RPA 6mm); now progressing to Stage 2 (BDGS); TV annulus 8mm very small — tricuspid annuloplasty to optimize flow through hypoplastic TV; atrial septectomy to ensure unobstructed mixing; PDA stent removed as BDGS will provide pulmonary flow; single ventricle pathway confirmed by severely hypoplastic TV/RV.

CASE AF: ALCAPA to RPA origin + MV prolapse + Severe MR. Age 12y 1m. ALCAPA (anomalous left coronary artery from PA — specifically to RPA origin, unusual variant). AML + PML prolapse, severe MR (VC 8mm). Dilated IVC+hepatic veins. Dilated RCA, LMCA, LAD. Flow reversal in LAD. Multiple coronary collaterals. Normal LV function (LVEF 70%), dilated LA+LV.
MANAGEMENT: ALCAPA repair + MVR (mitral valve replacement). Rationale: ALCAPA — left coronary arises from PA instead of aorta — causes chronic ischemia (myocardium perfused by low-pressure, deoxygenated blood); coronary collaterals have compensated so far (hence preserved LVEF); surgical reimplantation of ALCAPA to aorta is definitive repair; severe MR with dilated LA+LV and prolapsing valve needs MVR (at this age and MR severity, repair unlikely to be durable) concurrent with ALCAPA repair.

CASE AG: CCTGA situs solitus dextrocardia + large inlet VSD + severe TR + LVOTO from accessory TV membrane. Age 40y 4m, SpO2 96%. CC-TGA (situs solitus, dextrocardia, AV-VA discordance, L-looped, L-posed aorta), large inlet VSD bidirectional, severe systemic-sided TR (left-sided TV, TR VC large), accessory membrane on TV protruding into LVOT (moderate-severe LVOTO, Gmax 62mmHg), RV (systemic ventricle) dysfunction, dilated hepatic veins.
MANAGEMENT: CVTS opinion for high risk Senning + TV repair + MV repair + VSD closure + accessory TV tissue resection vs medical management. Rationale: Adult CCTGA (40y) with severe systemic AV valve regurgitation + LVOTO — complex anatomy with systemic RV failure; Senning (atrial switch) in this context restores systemic LV as pumping chamber; TV repair to address severe TR; accessory membrane resection relieves LVOTO; VSD closure; however at age 40 with established RV dysfunction, surgery is very high risk — CVTS multidisciplinary discussion vs optimal medical management with HF therapy.

CASE AH: DORV + borderline LV routability + severe subvalvar PS + VSD enlargement needed. Age 10m 5d, SpO2 81%, Wt 7.7kg. DORV, moderate-large posterior muscular VSD with subaortic extension (bidirectional), LV to aorta borderline routable (will need VSD enlargement), severe subvalvar PS (Gmax 64mmHg), posterior deviation of conal septum, adequate RV cavity, good branch PAs.
MANAGEMENT: IVTR (VSD closure/rerouting) + conal septum resection vs BDGS + MPA ligation. Rationale: DORV with borderline LV routability — debate between biventricular repair (IVTR requiring VSD enlargement + conal septum resection) and univentricular palliation (BDGS); key factor is whether VSD enlargement risks AV node; good PS gradient (64mmHg) means adequate PS to balance circulation post-BDGS; if IVTR chosen, must enlarge VSD anterosuperiorly and resect deviated conal septum; surgical team decision based on intraoperative assessment.

CASE AI: DOLV + severe PS + PDA + neonatal. Age 25d, SpO2 80%, Wt 3.2kg. DOLV, side-by-side GAs, moderate subaortic VSD bidirectional, severe subvalvar+valvar PS (predominantly valvar, Gmax 55mmHg), confluent good PAs, small-moderate PDA with L→R shunt, normal biventricular function.
MANAGEMENT: Medical stabilization, PDA stenting SOS (if required). Rationale: DOLV with severe PS and PDA — PDA provides some augmented pulmonary flow; SpO2 80% but stable; weight 3.2kg too small for surgical repair; medical stabilization with close monitoring; if SpO2 drops or PDA narrows, PDA stenting to maintain pulmonary flow as bridge; plan surgical VSD closure + RVOT reconstruction when weight ≥5kg.

CASE AJ: Large malaligned PM VSD + conal septum RVOTO + SAM + right aortic arch with aberrant LSCA. Age 7y 6m, SpO2 99%, Wt 17.6kg. Large malaligned PM VSD (L→R), dilated LA+LV, prominent conal septum causing moderate subvalvar RVOTO (Gmax 48mmHg), small non-obstructive SAM from malaligned IVS crest, right aortic arch with aberrant LSCA.
MANAGEMENT: VSD surgical closure + conal septum resection + SAM resection + PDA raphe resection if present. Rationale: Malaligned VSD with RVOTO — conal septum resection and VSD closure together prevent residual RVOTO post-repair; SAM from malaligned IVS crest will resolve with VSD closure (SAM non-obstructive now but may worsen with patch); right aortic arch with aberrant LSCA — surgeons must be aware of vascular ring anatomy; PDA raphe resection if identified intraoperatively.

CASE AK: DORV 200% + restrictive posterior muscular VSD + LV not routable + severe PS + bilateral SVC + mild PAH. Age 3m 1d, SpO2 98%, Wt 4.9kg. DORV (200°), bilateral SVC, restrictive posterior muscular VSD with L→R (Gmax 60mmHg), posterior deviation conal septum, LV not routable to Aorta or PA, moderate-severe subvalvar PS (Gmax 60mmHg), mild PAH, good antegrade flow.
MANAGEMENT: Follow-up 1 month, then plan atrial septectomy + VSD enlargement +/- PA band. Rationale: DORV with LV not routable and restrictive VSD — definitive repair requires VSD enlargement; SpO2 98% and normal biventricular function means no urgency right now; mild PAH with restrictive VSD means PA band not urgently needed; plan: in 1 month, elective atrial septectomy (for mixing) + VSD enlargement to allow VSD-to-aorta tunnel routing; PA band if PAH progresses; bilateral SVC does not affect surgical approach directly.

CASE AL: Large mid muscular VSD + severe juxtaductal CoA + severe PAH. Age 7y 3m, SpO2 88%, Wt 14.5kg. Large mid-muscular VSD with anterior extension (bidirectional), hypoplastic distal arch + isthmus with severe juxtaductal coarctation (gradient 45/18mmHg, pan-diastolic spill, damp DTA), confluent dilated PAs, severe PAH, normal biventricular function.
MANAGEMENT: CT aortogram followed by further plan. Rationale: VSD + CoA + severe PAH — critical to delineate arch anatomy by CTA before any intervention; CoA with VSD creates complex hemodynamics (CoA increases LV afterload while VSD shunts volume); PAH severity must be assessed (reversible? Eisenmenger?); if PAH reversible: simultaneous CoA repair + VSD closure; if Eisenmenger: no VSD closure, CoA repair only + pulmonary vasodilator therapy; CTA first to map anatomy and plan.

CASE AM: TAPVD + TOF + PA atresia + bilateral PDAs + hypoplastic PAs + right aortic arch with aberrant LSCA. Age 1m 8d, SpO2 80%, Wt 2.9kg. TAPVD (PVs to LA roof), large malaligned ASD with R→L, large CVT VSD with bidirectional shunt, PA atresia, right aortic arch with aberrant LSCA, bilateral PDAs (right from left innominate, left from arch undersurface) supplying ipsilateral hypoplastic branch PAs, RA+RV dilated.
MANAGEMENT: CTPA followed by further plan. Rationale: Extremely complex anatomy — TAPVD + PA-VSD + bilateral PDAs + right aortic arch + aberrant LSCA; CTA/CTPA mandatory to map: PDA anatomy, branch PA size and confluency, pulmonary venous drainage site exactly, aortic arch branching; management plan will depend on anatomy: if PAs confluent and adequately sized → unifocalization + ICR + TAPVD repair; if PAs discontinuous/tiny → staged unifocalization first; no surgery without CT roadmap.

    optional:  ["atrial_septum.asd_presence"],
    forbid:    ["great_arteries.coarctation.presence"],
    label: "Interrupted Aortic Arch"
  },
  "CoA": {
    mandatory: ["great_arteries.coarctation.presence"],
    optional:  ["ductal_structures.pda.presence", "ventricular_septum.vsd_presence"],
    forbid:    ["great_arteries.interrupted_aortic_arch.presence"],
    label: "Coarctation of Aorta"
  },
  "Ebstein": {
    mandatory: ["av_valves.tricuspid_valve.ebstein"],
    optional:  ["atrial_septum.asd_presence", "ductal_structures.pda.presence"],
    forbid:    ["av_valves.tricuspid_valve.atresia"],
    label: "Ebstein Anomaly of Tricuspid Valve"
  },
  "Complete AVSD": {
    mandatory: ["av_valves.common_av_valve", "atrial_septum.asd_presence", "ventricular_septum.vsd_presence"],
    optional:  [],
    forbid:    [],
    balanced_default: true,
    note: "Unbalanced only if RV or LV hypoplasia explicitly stated",
    label: "Complete AVSD"
  }
};

// 2. Deep-get helper for dotted paths
function deepGet(obj, path) {
  return path.split(".").reduce((cur, k) => (cur == null ? null : cur[k]), obj);
}

// 3. isPresent — checks both boolean true and object { presence: true }
function isPresent(val) {
  if (val === null || val === undefined) return false;
  if (typeof val === "boolean") return val === true;
  if (typeof val === "object") return val.presence === true;
  return false;
}

// 4. isPresentPath — checks a dotted path
function isPresentPath(o, path) {
  const val = deepGet(o, path);
  return isPresent(val);
}

// 5. Deep-set helper
function deepSet(obj, path, value) {
  const parts = path.split(".");
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    if (cur[parts[i]] == null || typeof cur[parts[i]] !== "object") cur[parts[i]] = {};
    cur = cur[parts[i]];
  }
  const last = parts[parts.length - 1];
  if (typeof cur[last] === "object" && cur[last] !== null) {
    cur[last].presence = true;
  } else {
    cur[last] = true;
  }
}

function autoCorrect(corrected, path, reason, corrections) {
  if (!isPresentPath(corrected, path)) {
    deepSet(corrected, path, true);
    corrections.push(`Auto-added: ${path} (${reason})`);
  }
}

// 6. Main segmental rule engine
function runSegmentalRuleEngine(o) {
  const errors      = [];
  const warnings    = [];
  const corrections = [];
  const corrected   = JSON.parse(JSON.stringify(o));

  const diag = ((o.final_diagnosis || "") + " " + (o.segmental_analysis?.great_artery_relation || "")).toUpperCase();

  // ── Rule 1: Pulmonary atresia and PS cannot coexist ──
  if (isPresentPath(o, "semilunar_valves.pulmonary_valve.atresia") &&
      isPresentPath(o, "semilunar_valves.pulmonary_valve.stenosis")) {
    errors.push("Pulmonary atresia and pulmonary stenosis cannot coexist");
    deepSet(corrected, "semilunar_valves.pulmonary_valve.stenosis", false);
    corrections.push("Cleared: pulmonary_valve.stenosis (incompatible with atresia)");
  }

  // ── Rule 2: TAPVC → pulmonary_venous_return must be TAPVC ──
  if (isPresentPath(o, "major_lesions.tapvc.presence")) {
    if (o.pulmonary_venous_return?.type !== "TAPVC") {
      errors.push("TAPVC present but pulmonary_venous_return.type ≠ 'TAPVC'");
      if (corrected.pulmonary_venous_return) corrected.pulmonary_venous_return.type = "TAPVC";
      else corrected.pulmonary_venous_return = { type: "TAPVC" };
      corrections.push("Auto-set: pulmonary_venous_return.type = TAPVC");
    }
    // TAPVC requires ASD
    if (!o.atrial_septum?.asd_presence) {
      warnings.push("TAPVC requires ASD/PFO for systemic mixing — not documented");
      autoCorrect(corrected, "atrial_septum.asd_presence", "obligatory for TAPVC", corrections);
    }
  }

  // ── Rule 3: Tricuspid atresia + AV concordance impossible ──
  if (o.av_valves?.tricuspid_valve?.atresia === true) {
    if (o.segmental_analysis?.av_connection === "concordant") {
      errors.push("Tricuspid atresia is anatomically incompatible with AV concordance");
      corrected.segmental_analysis.av_connection = "absent_connection";
      corrections.push("Auto-corrected: av_connection → absent_connection (tricuspid atresia)");
    }
    if (!o.atrial_septum?.asd_presence) {
      warnings.push("Tricuspid atresia requires ASD — not documented");
      autoCorrect(corrected, "atrial_septum.asd_presence", "obligatory for tricuspid atresia", corrections);
    }
  }

  // ── Rule 4: TGA requires discordant VA ──
  if (diag.includes("TGA") || diag.includes("D-TGA") || diag.includes("L-TGA") ||
      o.major_lesions?.tga?.presence) {
    const va = o.segmental_analysis?.va_connection;
    if (va && va !== "discordant") {
      errors.push("TGA requires discordant VA connection");
      corrected.segmental_analysis.va_connection = "discordant";
      corrections.push("Auto-corrected: va_connection → discordant (TGA)");
    }
  }

  // ── Rule 5: CCTGA requires L-loop + discordant AV + discordant VA ──
  if (o.major_lesions?.cctga) {
    if (o.segmental_analysis?.ventricular_loop !== "L_loop") {
      warnings.push("CCTGA typically has L-loop ventricles");
    }
    if (o.segmental_analysis?.av_connection !== "discordant") {
      warnings.push("CCTGA requires discordant AV connection");
    }
    if (o.segmental_analysis?.va_connection !== "discordant") {
      warnings.push("CCTGA requires discordant VA connection");
    }
  }

  // ── Rule 6: TOF mandatory triad ──
  if (o.major_lesions?.tetralogy_of_fallot || diag.includes("TOF")) {
    if (!o.semilunar_valves?.pulmonary_valve?.atresia) { // pure TOF (not PA-VSD)
      if (!o.ventricular_septum?.vsd_presence) {
        warnings.push("TOF requires VSD — not documented");
        autoCorrect(corrected, "ventricular_septum.vsd_presence", "mandatory in TOF", corrections);
      }
      if (!o.outflow_tract?.rvot_obstruction?.presence && !o.semilunar_valves?.pulmonary_valve?.stenosis) {
        warnings.push("TOF requires RVOT obstruction or PS — not documented");
        autoCorrect(corrected, "outflow_tract.rvot_obstruction.presence", "mandatory in TOF", corrections);
      }
      if (!o.great_arteries?.aorta_override_percent) {
        warnings.push("TOF requires documented aortic override — not quantified");
      }
    }
  }

  // ── Rule 7: DORV requires VSD ──
  if (isPresentPath(o, "major_lesions.dorv.presence")) {
    if (!o.ventricular_septum?.vsd_presence) {
      warnings.push("DORV requires VSD — not documented");
      autoCorrect(corrected, "ventricular_septum.vsd_presence", "mandatory in DORV", corrections);
    }
    if (o.segmental_analysis?.va_connection === "concordant") {
      errors.push("DORV cannot have fully concordant VA connection");
      corrected.segmental_analysis.va_connection = "double_outlet";
      corrections.push("Auto-corrected: va_connection → double_outlet (DORV)");
    }
  }

  // ── Rule 8: Truncus Arteriosus ──
  if (isPresentPath(o, "major_lesions.truncus_arteriosus.presence")) {
    if (!o.ventricular_septum?.vsd_presence) {
      warnings.push("Truncus arteriosus requires VSD — not documented");
      autoCorrect(corrected, "ventricular_septum.vsd_presence", "mandatory in truncus", corrections);
    }
    if (isPresentPath(o, "semilunar_valves.pulmonary_valve.stenosis")) {
      errors.push("Truncus arteriosus cannot have separate pulmonary stenosis (no separate PA exists)");
      if (corrected.semilunar_valves?.pulmonary_valve) corrected.semilunar_valves.pulmonary_valve.stenosis = false;
      corrections.push("Cleared: pulmonary_valve.stenosis (incompatible with truncus)");
    }
    if (isPresentPath(o, "semilunar_valves.pulmonary_valve.atresia")) {
      errors.push("Truncus arteriosus cannot have pulmonary atresia — no separate pulmonary valve exists");
      if (corrected.semilunar_valves?.pulmonary_valve) corrected.semilunar_valves.pulmonary_valve.atresia = false;
      corrections.push("Cleared: pulmonary_valve.atresia (incompatible with truncus)");
    }
    if (o.segmental_analysis?.va_connection !== "single_outlet") {
      corrections.push("Note: Truncus arteriosus → va_connection should be 'single_outlet'");
    }
  }

  // ── Rule 9: IAA + CoA mutual exclusion ──
  if (isPresentPath(o, "great_arteries.interrupted_aortic_arch.presence")) {
    if (!o.ductal_structures?.pda?.presence) {
      warnings.push("IAA requires PDA as source of descending aortic flow — not documented");
    }
    if (!o.ventricular_septum?.vsd_presence) {
      warnings.push("IAA almost always has VSD — not documented");
    }
    if (isPresentPath(o, "great_arteries.coarctation.presence")) {
      errors.push("IAA and CoA are mutually exclusive aortic arch diagnoses");
      if (corrected.great_arteries) corrected.great_arteries.coarctation = { presence: false };
      corrections.push("Cleared: coarctation (incompatible with IAA)");
    }
  }

  // ── Rule 10: Ebstein anomaly rules ──
  if (o.av_valves?.tricuspid_valve?.ebstein === true) {
    // Ebstein cannot coexist with tricuspid atresia
    if (o.av_valves?.tricuspid_valve?.atresia === true) {
      errors.push("Ebstein anomaly cannot coexist with tricuspid atresia — mutually exclusive TV morphologies");
      corrected.av_valves.tricuspid_valve.atresia = false;
      corrections.push("Cleared: tricuspid_valve.atresia (incompatible with Ebstein)");
    }
    // Ebstein typically has ASD/PFO — warn if absent
    if (!o.atrial_septum?.asd_presence) {
      warnings.push("Ebstein anomaly — ASD/PFO commonly present; not documented");
    }
    // RV outflow obstruction cannot exist in pure Ebstein (atrialized RV ≠ RVOTO)
    if (isPresentPath(o, "outflow_tract.rvot_obstruction.presence") &&
        !isPresentPath(o, "semilunar_valves.pulmonary_valve.stenosis")) {
      warnings.push("Ebstein with RVOTO — confirm functional PS vs. atrialized RV outflow");
    }
  }

  // ── Rule 11: AVSD balance — never call unbalanced without explicit hypoplasia ──
  const hasCommonAV = o.av_valves?.common_av_valve;
  const hasOstPrimASD = o.atrial_septum?.asd_type === "ostium_primum" || o.atrial_septum?.asd_presence;
  const hasInletVSD = o.ventricular_septum?.vsd_type === "inlet" || o.ventricular_septum?.vsd_presence;
  if (hasCommonAV && hasOstPrimASD && hasInletVSD) {
    const rvHypoplastic = o.ventricles?.rv_size === "hypoplastic";
    const lvHypoplastic = o.ventricles?.lv_size === "hypoplastic";
    if (!rvHypoplastic && !lvHypoplastic) {
      // Ensure diagnosis reflects balanced
      if ((o.final_diagnosis || "").toLowerCase().includes("unbalanced")) {
        warnings.push("AVSD labelled as unbalanced but no ventricular hypoplasia documented — should be Complete Balanced AVSD");
      }
      // Auto-annotate in corrected
      corrected._avsd_balance = "balanced";
      corrections.push("Note: AVSD classified as BALANCED (no ventricular hypoplasia stated)");
    } else {
      corrected._avsd_balance = rvHypoplastic ? "unbalanced_RV_dominant" : "unbalanced_LV_dominant";
      corrections.push(`Note: AVSD classified as UNBALANCED — ${corrected._avsd_balance}`);
    }
  }

  // ── Rule 12: Situs inversus + levocardia → unusual, flag ──
  if (o.segmental_analysis?.situs === "inversus" &&
      o.segmental_analysis?.cardiac_position === "levocardia") {
    warnings.push("Situs inversus + levocardia is rare — consider situs ambiguous or isomerism");
  }

  // ── Rule 11: HLHS must have hypoplastic LV + atresia/stenosis of mitral or aortic valve ──
  if (o.major_lesions?.hlhs) {
    if (o.ventricles?.lv_size !== "hypoplastic" && o.ventricles?.lv_size !== null) {
      warnings.push("HLHS requires hypoplastic LV — lv_size should be 'hypoplastic'");
    }
  }

  // ── Rule 12: Single ventricle → document which morphology ──
  if (o.ventricles?.single_ventricle === true && !o.segmental_analysis?.av_connection) {
    warnings.push("Single ventricle — AV connection not specified (double_inlet / absent_connection?)");
  }

  // ── Build segmental summary for UI ──
  const seg = o.segmental_analysis || {};
  const segmentalSummary = {
    atrial_segment: {
      situs:                  seg.situs          || "solitus",
      cardiac_position:       seg.cardiac_position || "levocardia",
      atrial_arrangement:     seg.atrial_arrangement || null,
      systemic_venous_return: o.systemic_venous_return?.svc_drainage && o.systemic_venous_return.svc_drainage !== "RA"
                                ? o.systemic_venous_return.svc_drainage : (o.systemic_venous_return?.lsvc ? "LSVC present" : "normal"),
      pulmonary_venous_return: o.pulmonary_venous_return?.type || "normal"
    },
    ventricular_segment: {
      av_connection:       seg.av_connection       || "concordant",
      ventricular_loop:    seg.ventricular_loop    || "D_loop",
      ventricular_topology: seg.ventricular_topology || null,
      av_valve_morphology: seg.av_valve_morphology  || null
    },
    arterial_segment: {
      va_connection:       seg.va_connection        || "concordant",
      great_artery_relation: seg.great_artery_relation || "normal",
      arch_sidedness:      o.great_arteries?.arch_sidedness || null
    }
  };

  corrected._segmental_analysis = segmentalSummary;
  corrected._validation = { errors, warnings, corrections };

  return { corrected, errors, warnings, corrections, segmentalSummary };
}


async function callClaude(systemPrompt, userContent) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 2500,
      system: systemPrompt,
      messages: [{ role: "user", content: userContent }],
    }),
  });
  const data = await response.json();
  if (!data.content) throw new Error(data.error?.message || "API error");
  return data.content.map(b => b.text || "").join("");
}
