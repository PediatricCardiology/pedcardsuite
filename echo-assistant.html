// Simple hash for report text → cache key
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = (Math.imul(31, h) + s.charCodeAt(i)) | 0; }
  return String(h >>> 0);
}

// ── Counseling sub-component (needs its own hook scope) ──
function CounselingPanel({ counseling }) {
  const { useState } = React;
  const [lang, setLang] = useState("both");

  // ── Robust parser: handles --- separators, # headers, [HINDI]/[GUJARATI] tags ──
  // Strategy: find the line that introduces each language section, then grab everything until
  // the next language header or end of text.
  const HINDI_RE    = /^(#+\s*)?(HINDI|Hindi|हिंदी|\[HINDI\])/i;
  const GUJARATI_RE = /^(#+\s*)?(GUJARATI|Gujarati|ગુજરાતી|\[GUJARATI\])/i;

  const lines = counseling.split("\n");
  let hindiStart = -1, gujaratiStart = -1;

  lines.forEach((line, i) => {
    const t = line.trim();
    if (HINDI_RE.test(t)    && hindiStart    === -1) hindiStart    = i;
    if (GUJARATI_RE.test(t) && gujaratiStart === -1) gujaratiStart = i;
  });

  let hindi = "", gujarati = "";

  if (hindiStart !== -1 && gujaratiStart !== -1) {
    // Both markers found — slice between them
    const firstEnd  = Math.min(hindiStart, gujaratiStart);
    const secondStart = Math.max(hindiStart, gujaratiStart);
    if (hindiStart < gujaratiStart) {
      hindi    = lines.slice(hindiStart + 1, gujaratiStart).join("\n").trim();
      gujarati = lines.slice(gujaratiStart + 1).join("\n").trim();
    } else {
      gujarati = lines.slice(gujaratiStart + 1, hindiStart).join("\n").trim();
      hindi    = lines.slice(hindiStart + 1).join("\n").trim();
    }
  } else if (hindiStart !== -1) {
    hindi = lines.slice(hindiStart + 1).join("\n").trim();
  } else if (gujaratiStart !== -1) {
    gujarati = lines.slice(gujaratiStart + 1).join("\n").trim();
  } else {
    // No markers at all — split on --- if present, else put everything in hindi
    const parts = counseling.split(/\n---+\n/).map(b => b.trim()).filter(Boolean);
    hindi    = parts[0] || counseling.trim();
    gujarati = parts[1] || "";
  }

  // Strip leading --- lines and language header lines from each block
  const cleanBlock = (text) => text
    .split("\n")
    .filter(line => !(/^-{2,}$/.test(line.trim())) && !HINDI_RE.test(line.trim()) && !GUJARATI_RE.test(line.trim()))
    .join("\n")
    .trim();

  hindi    = cleanBlock(hindi);
  gujarati = cleanBlock(gujarati);

  const renderBlock = (text) => {
    if (!text) return null;
    return text.split("\n").map((line, i) => {
      const t = line.trim();
      if (!t) return <div key={i} style={{ height: 6 }} />;
      // Strip markdown heading hashes
      const stripped = t.replace(/^#+\s*/, "");
      const isSection = /^[🫀🏠🚨🔧]/.test(stripped);
      if (isSection) return (
        <div key={i} style={{
          marginTop: 14, marginBottom: 6, fontSize: 13, fontWeight: 700,
          color: "#fbbf24", fontFamily: "sans-serif",
          borderBottom: "1px solid rgba(251,191,36,0.2)", paddingBottom: 4
        }}>{stripped}</div>
      );
      // Bold markdown **text**
      const parts = stripped.split(/(\*\*[^*]+\*\*)/g);
      const rendered = parts.map((p, j) =>
        p.startsWith("**") && p.endsWith("**")
          ? <strong key={j}>{p.slice(2,-2)}</strong>
          : p
      );
      return (
        <div key={i} style={{
          fontSize: 14, lineHeight: 1.85, color: "#e2e8f0",
          fontFamily: "sans-serif", marginBottom: 2
        }}>{rendered}</div>
      );
    });
  };

  return (
    <div>
      <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
        {[["both", "हिंदी + ગુજરાતી"], ["hindi", "हिंदी only"], ["gujarati", "ગુજરાતી only"]].map(([id, label]) => (
          <button key={id} onClick={() => setLang(id)} style={{
            padding: "5px 12px", borderRadius: 6, border: "none", cursor: "pointer",
            fontSize: 12, fontFamily: "sans-serif", fontWeight: lang === id ? 700 : 500,
            background: lang === id ? "rgba(251,191,36,0.2)" : "rgba(30,41,59,0.6)",
            color: lang === id ? "#fbbf24" : "#64748b",
            borderBottom: lang === id ? "2px solid #fbbf24" : "2px solid transparent",
          }}>{label}</button>
        ))}
      </div>

      {(lang === "both" || lang === "hindi") && hindi && (
        <div style={{
          background: "rgba(15,23,42,0.7)", border: "1px solid rgba(251,191,36,0.2)",
          borderRadius: 10, padding: "16px 18px", marginBottom: lang === "both" ? 16 : 0
        }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#fbbf24", letterSpacing: "0.1em", marginBottom: 10, fontFamily: "monospace" }}>🇮🇳 HINDI — हिंदी</div>
          {renderBlock(hindi)}
        </div>
      )}

      {(lang === "both" || lang === "gujarati") && gujarati && (
        <div style={{
          background: "rgba(15,23,42,0.7)", border: "1px solid rgba(251,191,36,0.2)",
          borderRadius: 10, padding: "16px 18px"
        }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#fbbf24", letterSpacing: "0.1em", marginBottom: 10, fontFamily: "monospace" }}>🕌 GUJARATI — ગુજરાતી</div>
          {renderBlock(gujarati)}
        </div>
      )}
    </div>
  );
}

function ManagementPanel({ management }) {
  var SECTION_DEFS = [
    { key: "URGENCY",           prefix: "\uD83D\uDD34", color: "#ef4444", bg: "rgba(239,68,68,0.08)"    },
    { key: "INTERVENTION",      prefix: "\uD83C\uDFE5", color: "#3b82f6", bg: "rgba(59,130,246,0.08)"   },
    { key: "DECISION",          prefix: "\u2696",       color: "#8b5cf6", bg: "rgba(139,92,246,0.08)"   },
    { key: "MEDICAL",           prefix: "\uD83D\uDC8A", color: "#10b981", bg: "rgba(16,185,129,0.08)"  },
    { key: "PRECAUTIONS",       prefix: "\u26A0",       color: "#f59e0b", bg: "rgba(245,158,11,0.08)"   },
    { key: "FOLLOWUP",          prefix: "\uD83D\uDCC5", color: "#06b6d4", bg: "rgba(6,182,212,0.08)"    },
    { key: "ALTERNATIVES",      prefix: "\uD83D\uDD04", color: "#6366f1", bg: "rgba(99,102,241,0.08)"   },
  ];

  var LABELS = {
    URGENCY:      "URGENCY",
    INTERVENTION: "RECOMMENDED INTERVENTION",
    DECISION:     "DECISION BASIS",
    MEDICAL:      "MEDICAL MANAGEMENT",
    PRECAUTIONS:  "PRE-INTERVENTION PRECAUTIONS",
    FOLLOWUP:     "FOLLOW-UP PLAN",
    ALTERNATIVES: "ALTERNATIVE OPTIONS",
  };

  // Parse raw text into keyed blocks by detecting section start lines
  var lines = management.split("\n");
  var parsed = {};
  var currentKey = null;
  var currentLines = [];

  lines.forEach(function(line) {
    var t = line.trim();
    var matched = null;
    SECTION_DEFS.forEach(function(def) {
      if (!matched && t.indexOf(def.prefix) === 0) matched = def;
    });
    if (matched) {
      if (currentKey) parsed[currentKey] = currentLines.join("\n").trim();
      currentKey = matched.key;
      // strip the header line content after the emoji
      var rest = t.replace(matched.prefix, "").replace(matched.key, "").trim();
      currentLines = rest ? [rest] : [];
    } else if (currentKey) {
      currentLines.push(line);
    }
  });
  if (currentKey) parsed[currentKey] = currentLines.join("\n").trim();

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
      {SECTION_DEFS.map(function(def) {
        var blockText = parsed[def.key];
        if (!blockText) return null;
        var blockLines = blockText.split("\n").filter(function(l) { return l.trim(); });
        return (
          <div key={def.key} style={{
            background: def.bg,
            border: "1px solid " + def.color + "44",
            borderLeft: "4px solid " + def.color,
            borderRadius: 8,
            padding: "10px 14px",
          }}>
            <div style={{
              fontSize: 11, fontWeight: 700, letterSpacing: "0.07em",
              color: def.color, fontFamily: "monospace", marginBottom: 8,
              display: "flex", alignItems: "center", gap: 6,
            }}>
              <span>{def.prefix}</span>
              <span>{LABELS[def.key]}</span>
            </div>
            {blockLines.map(function(ln, i) {
              var t2 = ln.trim();
              if (!t2) return null;
              var isBullet = t2[0] === "-" || t2[0] === "\u2022" || t2[0] === "\u00B7";
              var txt = isBullet ? t2.slice(1).trim() : t2;
              return (
                <div key={i} style={{
                  display: "flex", gap: 8,
                  marginBottom: i < blockLines.length - 1 ? 5 : 0,
                }}>
                  {isBullet
                    ? <span style={{ color: def.color, fontWeight: 700, flexShrink: 0, marginTop: 2 }}>{"\u25B8"}</span>
                    : null}
                  <span style={{
                    fontSize: 13, lineHeight: 1.75, color: "#e2e8f0",
                    fontFamily: "sans-serif",
                    fontWeight: (!isBullet && i === 0) ? 600 : 400,
                  }}>{txt}</span>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}


function EchoAssistant() {
  const [report, setReport] = useState("");
  const [patientAge, setPatientAge] = useState("");
  const [patientWeight, setPatientWeight] = useState("");
  const [patientSpo2, setPatientSpo2] = useState("");
  const [activeTab, setActiveTab] = useState("conclusion");
  const [conclusion, setConclusion] = useState("");
  const [ontology, setOntology] = useState(null);
  const [svgDiagram, setSvgDiagram] = useState("");
  const [loading, setLoading] = useState({ conclusion: false, ontology: false, diagram: false, counseling: false, management: false });
  const [counseling, setCounseling] = useState("");
  const [management, setManagement] = useState("");
  const [errors, setErrors] = useState({});
  const [generated, setGenerated] = useState({ conclusion: false, ontology: false, diagram: false, counseling: false, management: false });
  const [validation, setValidation] = useState(null);  // { errors, warnings, corrections, segmentalSummary }
  // Cache: { [reportHash]: { conclusion, ontology, diagram, validation } }
  const cache = useRef({});
  // Track which report hash current outputs belong to
  const currentHash = useRef("");

  // When report changes, check if we have cached results and restore them,
  // otherwise clear stale outputs
  const onReportChange = (val) => {
    setReport(val);
    const h = hashStr(val.trim());
    if (h !== currentHash.current) {
      currentHash.current = h;
      const cached = cache.current[h] || {};
      setConclusion(cached.conclusion || "");
      setOntology(cached.ontology || null);
      setSvgDiagram(cached.diagram || "");
      setCounseling(cached.counseling || "");
      setManagement(cached.management || "");
      setValidation(cached.validation || null);
      setGenerated({
        conclusion: !!cached.conclusion,
        ontology: !!cached.ontology,
        diagram: !!cached.diagram,
        counseling: !!cached.counseling,
        management: !!cached.management,
      });
      setErrors({});
    }
  };

  const generate = async (type) => {
    if (!report.trim()) return;
    const h = hashStr(report.trim());
    // Cache hit — skip API call entirely
    if (cache.current[h]?.[type]) {
      if (type === "conclusion") setConclusion(cache.current[h].conclusion);
      if (type === "ontology") setOntology(cache.current[h].ontology);
      if (type === "diagram") setSvgDiagram(cache.current[h].diagram);
      setGenerated(g => ({ ...g, [type]: true }));
      return;
    }
    setLoading(l => ({ ...l, [type]: true }));
    setErrors(e => ({ ...e, [type]: null }));
    try {
      if (!cache.current[h]) cache.current[h] = {};

      if (type === "conclusion") {
        const result = await callClaude(CONCLUSION_SYSTEM_PROMPT, `Generate conclusion for this echo report:\n\n${report}`);
        const val = result.trim();
        setConclusion(val);
        cache.current[h].conclusion = val;
        setGenerated(g => ({ ...g, conclusion: true }));

      } else if (type === "ontology") {
        const result = await callClaude(ONTOLOGY_SYSTEM_PROMPT, `Convert this echo report to CHD ontology JSON:\n\n${report}`);
        const clean = result.replace(/```json|```/g, "").trim();
        const rawParsed = JSON.parse(clean);
        // ── Run segmental rule engine ──
        const { corrected, errors: vErr, warnings: vWarn, corrections: vFix, segmentalSummary } = runSegmentalRuleEngine(rawParsed);
        const vResult = { errors: vErr, warnings: vWarn, corrections: vFix, segmentalSummary };
        setOntology(corrected);
        setValidation(vResult);
        cache.current[h].ontology = corrected;
        cache.current[h].validation = vResult;
        setGenerated(g => ({ ...g, ontology: true }));

      } else if (type === "diagram") {
        // Reuse cached ontology for this report if available, else fetch
        let ont = cache.current[h].ontology || ontology;
        if (!ont) {
          const r = await callClaude(ONTOLOGY_SYSTEM_PROMPT, `Convert this echo report to CHD ontology JSON:\n\n${report}`);
          const clean = r.replace(/```json|```/g, "").trim();
          const rawOnt = JSON.parse(clean);
          const { corrected, errors: vErr, warnings: vWarn, corrections: vFix, segmentalSummary } = runSegmentalRuleEngine(rawOnt);
          const vResult = { errors: vErr, warnings: vWarn, corrections: vFix, segmentalSummary };
          ont = corrected;
          setOntology(ont);
          setValidation(vResult);
          cache.current[h].ontology = ont;
          cache.current[h].validation = vResult;
        }
        const svg = await callClaude(DIAGRAM_SYSTEM_PROMPT, `Generate CHD diagram SVG for this ontology:\n\n${JSON.stringify(ont, null, 2)}`);
        const svgMatch = svg.match(/<svg[\s\S]*<\/svg>/i);
        const val = svgMatch ? svgMatch[0] : svg;
        setSvgDiagram(val);
        cache.current[h].diagram = val;
        setGenerated(g => ({ ...g, diagram: true }));

      } else if (type === "counseling") {
        // Need conclusion/diagnosis — reuse from cache or extract
        let diagText = cache.current[h]?.conclusion || conclusion;
        if (!diagText) {
          diagText = await callClaude(CONCLUSION_SYSTEM_PROMPT, `Generate conclusion for this echo report:\n\n${report}`);
          diagText = diagText.trim();
          setConclusion(diagText);
          cache.current[h].conclusion = diagText;
          setGenerated(g => ({ ...g, conclusion: true }));
        }
        const prompt = `Echo report:\n${report}\n\nClinical conclusion:\n${diagText}\n\nGenerate parent counseling explanation in Hindi and Gujarati as instructed.`;
        const val = await callClaude(COUNSELING_SYSTEM_PROMPT, prompt);
        setCounseling(val.trim());
        cache.current[h].counseling = val.trim();
        setGenerated(g => ({ ...g, counseling: true }));

      } else if (type === "management") {
        // Need conclusion — reuse from cache or generate
        let diagText = cache.current[h]?.conclusion || conclusion;
        if (!diagText) {
          diagText = await callClaude(CONCLUSION_SYSTEM_PROMPT, `Generate conclusion for this echo report:\n\n${report}`);
          diagText = diagText.trim();
          setConclusion(diagText);
          cache.current[h].conclusion = diagText;
          setGenerated(g => ({ ...g, conclusion: true }));
        }
        const ageStr   = patientAge    ? `Age: ${patientAge}` : "Age: not specified";
        const wtStr    = patientWeight ? `Weight: ${patientWeight} kg` : "Weight: not specified";
        const spo2Str  = patientSpo2   ? `SpO2: ${patientSpo2}%` : "SpO2: not specified";
        const mgmtPrompt = `PATIENT DETAILS:\n${ageStr}\n${wtStr}\n${spo2Str}\n\nECHO REPORT:\n${report}\n\nCLINICAL CONCLUSION:\n${diagText}\n\nProvide the complete management plan as instructed, using the patient details above.`;
        const val = await callClaude(MANAGEMENT_SYSTEM_PROMPT, mgmtPrompt);
        setManagement(val.trim());
        cache.current[h].management = val.trim();
        setGenerated(g => ({ ...g, management: true }));
      }
    } catch (err) {
      setErrors(e => ({ ...e, [type]: err.message }));
    }
    setLoading(l => ({ ...l, [type]: false }));
  };

  const copyText = (text) => navigator.clipboard.writeText(text);

  const tabs = [
    { id: "conclusion", label: "Conclusion", icon: "📋" },
    { id: "ontology", label: "Ontology", icon: "🔬" },
    { id: "diagram", label: "Diagram", icon: "🫀" },
    { id: "counseling", label: "Family Counseling", icon: "🗣️" },
    { id: "management", label: "Management", icon: "💊" },
  ];

  // Section headers for top-level ontology keys
  const SECTION_LABELS = {
    segmental_analysis: "① Segmental Analysis",
    systemic_venous_return: "② Systemic Venous Return",
    pulmonary_venous_return: "③ Pulmonary Venous Return",
    atrial_septum: "④ Atrial Septum",
    ventricular_septum: "⑤ Ventricular Septum",
    av_valves: "⑥ AV Valves",
    ventricles: "⑦ Ventricles",
    outflow_tract: "⑧ Outflow Tracts",
    semilunar_valves: "⑨ Semilunar Valves",
    great_arteries: "⑩ Great Arteries",
    ductal_structures: "⑪ Ductal Structures",
    major_lesions: "⑫ Major Lesions",
    hemodynamics: "⑬ Hemodynamics",
    surgical_history: "⑭ Surgical History",
    final_diagnosis: "⑮ Final Diagnosis",
    _segmental_analysis: null, // hide internal field
    _validation: null,         // hide internal field
  };

  function hasAnyValue(obj) {
    if (obj === null || obj === undefined) return false;
    if (typeof obj !== "object") return true;
    return Object.values(obj).some(v => hasAnyValue(v));
  }

  const renderValue = (v) => {
    if (v === null || v === undefined) return null;
    if (typeof v === "boolean") return <span style={{ color: v ? "#22c55e" : "#ef4444" }}>{String(v)}</span>;
    if (typeof v === "number") return <span style={{ color: "#f59e0b" }}>{v}</span>;
    return <span style={{ color: "#e2e8f0" }}>{String(v)}</span>;
  };

  const renderOntologyLeaf = (obj, depth = 0) => {
    if (obj === null || obj === undefined) return null;
    if (typeof obj !== "object") return renderValue(obj);
    const nonNull = Object.entries(obj).filter(([k, v]) => hasAnyValue(v) && !k.startsWith("_"));
    if (nonNull.length === 0) return null;
    return (
      <div style={{ marginLeft: depth > 0 ? 12 : 0 }}>
        {nonNull.map(([k, v]) => (
          <div key={k} style={{ display: "flex", gap: 6, marginBottom: 2, alignItems: "flex-start" }}>
            <span style={{ color: "#93c5fd", minWidth: 130, fontWeight: 500, fontSize: 11, flexShrink: 0, opacity: 0.9 }}>
              {k.replace(/_/g, " ")}
            </span>
            <span style={{ flex: 1, fontSize: 11 }}>
              {typeof v === "object" ? renderOntologyLeaf(v, depth + 1) : renderValue(v)}
            </span>
          </div>
        ))}
      </div>
    );
  };

  const renderOntology = (obj) => {
    if (!obj) return null;
    const sections = Object.entries(obj).filter(([k]) => SECTION_LABELS[k] !== null && !k.startsWith("_"));
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
        {sections.map(([k, v]) => {
          const label = SECTION_LABELS[k];
          const content = renderOntologyLeaf(v, 1);
          if (!content && k !== "final_diagnosis") return null;
          return (
            <div key={k} style={{ marginBottom: 6 }}>
              {label && (
                <div style={{
                  fontSize: 10, fontWeight: 700, color: "#7dd3fc", letterSpacing: "0.08em",
                  marginBottom: 3, borderBottom: "1px solid rgba(71,85,105,0.3)", paddingBottom: 2,
                  fontFamily: "monospace"
                }}>{label}</div>
              )}
              {k === "final_diagnosis"
                ? <div style={{ fontSize: 14, color: "#fbbf24", fontWeight: 700, fontFamily: "Georgia, serif" }}>{v || "—"}</div>
                : content || <span style={{ fontSize: 10, color: "#334155", fontStyle: "italic" }}>no data</span>
              }
            </div>
          );
        })}
      </div>
    );
  };

  return (
    <div style={{
      minHeight: "100vh",
      background: "linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%)",
      fontFamily: "'Georgia', 'Times New Roman', serif",
      color: "#e2e8f0",
      padding: "16px 12px",
      boxSizing: "border-box",
    }}>
      {/* Header */}
      <div style={{ maxWidth: 860, margin: "0 auto 20px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 4 }}>
          <div style={{
            width: 38, height: 38, borderRadius: "50%", flexShrink: 0,
            background: "linear-gradient(135deg, #1d4ed8, #7c3aed)",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 18, boxShadow: "0 0 16px rgba(124,58,237,0.4)"
          }}>🫀</div>
          <div>
            <h1 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#f1f5f9", lineHeight: 1.2 }}>
              Echo Report Assistant
            </h1>
            <p style={{ margin: 0, fontSize: 10, color: "#64748b", fontFamily: "monospace", letterSpacing: "0.05em" }}>
              UN MEHTA INSTITUTE · PEDIATRIC ECHO CDSS
            </p>
          </div>
        </div>
        <div style={{ height: 1, background: "linear-gradient(90deg, #1d4ed8, transparent)", marginTop: 10 }} />
      </div>

      <div style={{ maxWidth: 860, margin: "0 auto", display: "flex", flexDirection: "column", gap: 16 }}>

        {/* Input Panel */}
        <div style={{
          background: "rgba(30,41,59,0.85)", borderRadius: 14, padding: 16,
          border: "1px solid rgba(71,85,105,0.4)", boxShadow: "0 4px 20px rgba(0,0,0,0.3)"
        }}>
          <label style={{ display: "block", fontSize: 10, fontWeight: 700, color: "#7dd3fc", letterSpacing: "0.12em", marginBottom: 8, fontFamily: "monospace" }}>
            ECHO REPORT FINDINGS
          </label>
          <textarea
            value={report}
            onChange={e => onReportChange(e.target.value)}
            placeholder={PLACEHOLDER}
            rows={8}
            style={{
              width: "100%", boxSizing: "border-box",
              background: "rgba(15,23,42,0.9)", border: "1px solid rgba(71,85,105,0.5)",
              borderRadius: 8, padding: "12px 14px", color: "#cbd5e1",
              fontSize: 13, lineHeight: 1.7, resize: "vertical",
              fontFamily: "'Courier New', monospace", outline: "none",
              transition: "border-color 0.2s",
            }}
            onFocus={e => e.target.style.borderColor = "#3b82f6"}
            onBlur={e => e.target.style.borderColor = "rgba(71,85,105,0.5)"}
          />

          {/* Patient details row — required for Management tab */}
          <div style={{ marginTop: 10, display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end" }}>
            <div style={{ flex: "1 1 140px" }}>
              <label style={{ display: "block", fontSize: 9, fontWeight: 700, color: "#94a3b8", letterSpacing: "0.1em", marginBottom: 4, fontFamily: "monospace" }}>
                AGE
              </label>
              <input
                value={patientAge}
                onChange={e => setPatientAge(e.target.value)}
                placeholder="e.g. 6 months, 2 years"
                style={{
                  width: "100%", boxSizing: "border-box",
                  background: "rgba(15,23,42,0.9)", border: "1px solid rgba(71,85,105,0.5)",
                  borderRadius: 7, padding: "7px 10px", color: "#cbd5e1",
                  fontSize: 12, fontFamily: "sans-serif", outline: "none",
                  transition: "border-color 0.2s",
                }}
                onFocus={e => e.target.style.borderColor = "#10b981"}
                onBlur={e => e.target.style.borderColor = "rgba(71,85,105,0.5)"}
              />
            </div>
            <div style={{ flex: "1 1 100px" }}>
              <label style={{ display: "block", fontSize: 9, fontWeight: 700, color: "#94a3b8", letterSpacing: "0.1em", marginBottom: 4, fontFamily: "monospace" }}>
                WEIGHT (kg)
              </label>
              <input
                value={patientWeight}
                onChange={e => setPatientWeight(e.target.value)}
                placeholder="e.g. 5.2"
                type="number"
                min="0"
                style={{
                  width: "100%", boxSizing: "border-box",
                  background: "rgba(15,23,42,0.9)", border: "1px solid rgba(71,85,105,0.5)",
                  borderRadius: 7, padding: "7px 10px", color: "#cbd5e1",
                  fontSize: 12, fontFamily: "sans-serif", outline: "none",
                  transition: "border-color 0.2s",
                }}
                onFocus={e => e.target.style.borderColor = "#10b981"}
                onBlur={e => e.target.style.borderColor = "rgba(71,85,105,0.5)"}
              />
            </div>
            <div style={{ flex: "1 1 100px" }}>
              <label style={{ display: "block", fontSize: 9, fontWeight: 700, color: patientSpo2 && parseInt(patientSpo2) < 80 ? "#ef4444" : "#94a3b8", letterSpacing: "0.1em", marginBottom: 4, fontFamily: "monospace" }}>
                SpO2 (%)
              </label>
              <input
                value={patientSpo2}
                onChange={e => setPatientSpo2(e.target.value)}
                placeholder="e.g. 92"
                type="number"
                min="0"
                max="100"
                style={{
                  width: "100%", boxSizing: "border-box",
                  background: patientSpo2 && parseInt(patientSpo2) < 80 ? "rgba(239,68,68,0.08)" : "rgba(15,23,42,0.9)",
                  border: patientSpo2 && parseInt(patientSpo2) < 80 ? "1px solid #ef4444" : "1px solid rgba(71,85,105,0.5)",
                  borderRadius: 7, padding: "7px 10px",
                  color: patientSpo2 && parseInt(patientSpo2) < 80 ? "#fca5a5" : "#cbd5e1",
                  fontSize: 12, fontFamily: "sans-serif", outline: "none",
                  fontWeight: patientSpo2 && parseInt(patientSpo2) < 80 ? 700 : 400,
                  transition: "all 0.2s",
                }}
                onFocus={e => { if (!(patientSpo2 && parseInt(patientSpo2) < 80)) e.target.style.borderColor = "#10b981"; }}
                onBlur={e => { if (!(patientSpo2 && parseInt(patientSpo2) < 80)) e.target.style.borderColor = "rgba(71,85,105,0.5)"; }}
              />
            </div>
            {patientSpo2 && parseInt(patientSpo2) < 80 && (
              <div style={{
                flex: "0 0 auto", background: "rgba(239,68,68,0.12)", border: "1px solid #ef444444",
                borderRadius: 6, padding: "6px 10px", fontSize: 11, color: "#fca5a5",
                fontFamily: "monospace", fontWeight: 700, alignSelf: "flex-end", marginBottom: 1,
              }}>
                {"⚠"} LOW SpO2
              </div>
            )}
          </div>
          {/* Buttons */}
          <div style={{ marginTop: 12, display: "flex", gap: 8, flexWrap: "wrap" }}>
            {tabs.map(t => {
              const isCached = !!cache.current[hashStr(report.trim())]?.[t.id];
              const isLoading = loading[t.id];
              return (
                <button
                  key={t.id}
                  onClick={() => { setActiveTab(t.id); generate(t.id); }}
                  disabled={isLoading || !report.trim() || (t.id === "management" && (!patientAge.trim() || !patientSpo2.trim()))}
                  style={{
                    padding: "8px 14px", borderRadius: 7, border: "none",
                    cursor: (report.trim() && !isLoading && !(t.id === "management" && (!patientAge.trim() || !patientSpo2.trim()))) ? "pointer" : "not-allowed",
                    background: isCached
                      ? "linear-gradient(135deg, #065f46, #047857)"
                      : isLoading
                        ? "rgba(59,130,246,0.3)"
                        : "linear-gradient(135deg, #1d4ed8, #4f46e5)",
                    color: "#fff", fontWeight: 600, fontSize: 12,
                    display: "flex", alignItems: "center", gap: 5,
                    opacity: (!report.trim() || (t.id === 'management' && (!patientAge.trim() || !patientSpo2.trim()))) ? 0.4 : 1,
                    transition: "all 0.2s",
                    boxShadow: isLoading ? "none" : "0 2px 8px rgba(79,70,229,0.3)",
                    fontFamily: "sans-serif",
                  }}
                >
                  <span>{t.icon}</span>
                  <span>
                    {isLoading ? "Generating…" : isCached ? `${t.label} ✓` : `Generate ${t.label}`}
                  </span>
                </button>
              );
            })}
          </div>
          {/* Cache hint */}
          {Object.values(generated).some(Boolean) && (
            <p style={{ margin: "8px 0 0", fontSize: 10, color: "#475569", fontFamily: "monospace" }}>
              ✓ cached — switching reports regenerates; same report reuses stored results
            </p>
          )}
        </div>

        {/* Output Panel */}
        <div style={{
          background: "rgba(30,41,59,0.85)", borderRadius: 14,
          border: "1px solid rgba(71,85,105,0.4)", boxShadow: "0 4px 20px rgba(0,0,0,0.3)",
          overflow: "hidden",
        }}>
          {/* Tabs */}
          <div style={{ display: "flex", borderBottom: "1px solid rgba(71,85,105,0.4)" }}>
            {tabs.map(t => (
              <button key={t.id} onClick={() => setActiveTab(t.id)}
                style={{
                  flex: 1, padding: "11px 4px", border: "none", cursor: "pointer",
                  background: activeTab === t.id ? "rgba(59,130,246,0.15)" : "transparent",
                  color: activeTab === t.id ? "#7dd3fc" : "#64748b",
                  borderBottom: activeTab === t.id ? "2px solid #3b82f6" : "2px solid transparent",
                  fontWeight: activeTab === t.id ? 700 : 500,
                  fontSize: 12, transition: "all 0.15s",
                  display: "flex", alignItems: "center", justifyContent: "center", gap: 5,
                  fontFamily: "sans-serif",
                }}>
                {t.icon} {t.label}
                {generated[t.id] && <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#22c55e", display: "inline-block" }} />}
              </button>
            ))}
          </div>

          <div style={{ padding: 16, minHeight: 200 }}>

            {/* CONCLUSION TAB */}
            {activeTab === "conclusion" && (
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <span style={{ fontSize: 10, fontWeight: 700, color: "#7dd3fc", letterSpacing: "0.12em", fontFamily: "monospace" }}>GENERATED CONCLUSION</span>
                  {conclusion && (
                    <button onClick={() => copyText(conclusion)}
                      style={{ background: "rgba(59,130,246,0.2)", border: "1px solid rgba(59,130,246,0.3)", borderRadius: 5, padding: "3px 10px", color: "#7dd3fc", cursor: "pointer", fontSize: 11, fontFamily: "sans-serif" }}>
                      Copy
                    </button>
                  )}
                </div>
                {loading.conclusion ? <LoadingPulse text="Generating conclusion…" />
                  : errors.conclusion ? <ErrorMsg msg={errors.conclusion} />
                  : conclusion ? (
                    <div style={{
                      background: "rgba(15,23,42,0.9)", borderRadius: 8, padding: "14px 16px",
                      border: "1px solid rgba(34,197,94,0.2)", fontSize: 14, lineHeight: 1.8,
                      color: "#e2e8f0", fontFamily: "Georgia, serif", whiteSpace: "pre-wrap",
                    }}>{conclusion}</div>
                  ) : <EmptyState text="Enter echo findings above and click Generate Conclusion" />}
              </div>
            )}

            {/* ONTOLOGY TAB */}
            {activeTab === "ontology" && (
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <span style={{ fontSize: 10, fontWeight: 700, color: "#7dd3fc", letterSpacing: "0.12em", fontFamily: "monospace" }}>CHD ONTOLOGY · JSON</span>
                  {ontology && (
                    <button onClick={() => copyText(JSON.stringify(ontology, null, 2))}
                      style={{ background: "rgba(59,130,246,0.2)", border: "1px solid rgba(59,130,246,0.3)", borderRadius: 5, padding: "3px 10px", color: "#7dd3fc", cursor: "pointer", fontSize: 11, fontFamily: "sans-serif" }}>
                      Copy JSON
                    </button>
                  )}
                </div>
                {loading.ontology ? <LoadingPulse text="Extracting structured ontology…" />
                  : errors.ontology ? <ErrorMsg msg={errors.ontology} />
                  : ontology ? (
                    <div style={{
                      background: "rgba(15,23,42,0.9)", borderRadius: 8, padding: "14px 16px",
                      border: "1px solid rgba(251,191,36,0.2)", overflowX: "auto",
                      fontFamily: "'Courier New', monospace",
                    }}>
                      {renderOntology(ontology)}
                    </div>
                  ) : <EmptyState text="Enter echo findings above and click Generate Ontology" />}
              </div>
            )}

            {/* DIAGRAM TAB */}
            {activeTab === "diagram" && (
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <span style={{ fontSize: 10, fontWeight: 700, color: "#7dd3fc", letterSpacing: "0.12em", fontFamily: "monospace" }}>CHD TEACHING DIAGRAM</span>
                  {svgDiagram && (
                    <button onClick={() => {
                      const dataUri = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svgDiagram);
                      const a = document.createElement("a");
                      a.href = dataUri;
                      a.download = "chd_diagram.svg";
                      document.body.appendChild(a);
                      a.click();
                      document.body.removeChild(a);
                    }}
                      style={{ background: "rgba(59,130,246,0.2)", border: "1px solid rgba(59,130,246,0.3)", borderRadius: 5, padding: "3px 10px", color: "#7dd3fc", cursor: "pointer", fontSize: 11, fontFamily: "sans-serif" }}>
                      Download SVG
                    </button>
                  )}
                </div>
                {loading.diagram ? <LoadingPulse text="Generating anatomical diagram…" />
                  : errors.diagram ? <ErrorMsg msg={errors.diagram} />
                  : svgDiagram ? (
                    // Mobile-safe: horizontally scrollable, SVG scales to container
                    <div style={{
                      background: "#fff", borderRadius: 8,
                      border: "1px solid rgba(71,85,105,0.3)",
                      overflowX: "auto", overflowY: "auto",
                      WebkitOverflowScrolling: "touch",
                      maxHeight: "70vh",
                      // Make inner SVG responsive
                    }}>
                      <div style={{ minWidth: 320 }}
                        dangerouslySetInnerHTML={{
                          __html: svgDiagram.replace(
                            /<svg([^>]*)>/i,
                            (match, attrs) => {
                              // Extract width/height to set viewBox if missing
                              const wMatch = attrs.match(/width="(\d+)"/);
                              const hMatch = attrs.match(/height="(\d+)"/);
                              const w = wMatch ? wMatch[1] : "580";
                              const h = hMatch ? hMatch[1] : "600";
                              const hasVB = /viewBox/.test(attrs);
                              const vb = hasVB ? "" : ` viewBox="0 0 ${w} ${h}"`;
                              // Remove fixed width/height, add viewBox + 100% width for responsiveness
                              const cleanAttrs = attrs
                                .replace(/width="[^"]*"/, 'width="100%"')
                                .replace(/height="[^"]*"/, `height="auto"`);
                              return `<svg${cleanAttrs}${vb} style="display:block;max-width:100%;height:auto;min-width:280px">`;
                            }
                          )
                        }}
                      />
                    </div>
                  ) : <EmptyState text="Enter echo findings above and click Generate Diagram" />}
              </div>
            )}

            {/* COUNSELING TAB */}
            {activeTab === "counseling" && (
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <span style={{ fontSize: 10, fontWeight: 700, color: "#7dd3fc", letterSpacing: "0.12em", fontFamily: "monospace" }}>PARENT COUNSELING — HINDI &amp; GUJARATI</span>
                  {counseling && (
                    <button onClick={() => copyText(counseling)}
                      style={{ background: "rgba(59,130,246,0.2)", border: "1px solid rgba(59,130,246,0.3)", borderRadius: 5, padding: "3px 10px", color: "#7dd3fc", cursor: "pointer", fontSize: 11, fontFamily: "sans-serif" }}>
                      Copy Text
                    </button>
                  )}
                </div>

                {loading.counseling ? <LoadingPulse text="Generating family counseling in Hindi & Gujarati…" />
                  : errors.counseling ? <ErrorMsg msg={errors.counseling} />
                  : counseling ? (
                    <CounselingPanel counseling={counseling} />
                  ) : (
                    <EmptyState text="Enter echo findings above and click Family Counseling" />
                  )}
              </div>
            )}

            {activeTab === "management" && (
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <span style={{ fontSize: 10, fontWeight: 700, color: "#34d399", letterSpacing: "0.12em", fontFamily: "monospace" }}>MANAGEMENT PLAN — AGE · SpO2 · ECHO BASED</span>
                  {management && (
                    <button onClick={() => copyText(management)}
                      style={{ background: "rgba(16,185,129,0.2)", border: "1px solid rgba(16,185,129,0.3)", borderRadius: 5, padding: "3px 10px", color: "#34d399", cursor: "pointer", fontSize: 11, fontFamily: "sans-serif" }}>
                      Copy Text
                    </button>
                  )}
                </div>
                {loading.management ? <LoadingPulse text="Generating management plan…" />
                  : errors.management ? <ErrorMsg msg={errors.management} />
                  : management ? (
                    <ManagementPanel management={management} />
                  ) : (
                    <div style={{ padding: "30px 16px", textAlign: "center" }}>
                      <div style={{ fontSize: 26, marginBottom: 10 }}>{"\uD83D\uDC8A"}</div>
                      <div style={{ color: "#64748b", fontFamily: "sans-serif", fontSize: 13, lineHeight: 1.8 }}>
                        Enter echo report, then fill{" "}
                        <span style={{ color: "#10b981", fontWeight: 700 }}>Age</span>{" + "}
                        <span style={{ color: "#10b981", fontWeight: 700 }}>SpO2</span>{" "}
                        above, then click <strong style={{ color: "#fff" }}>Generate Management</strong>
                      </div>
                      {report.trim() && (!patientAge.trim() || !patientSpo2.trim()) && (
                        <div style={{
                          marginTop: 12, background: "rgba(245,158,11,0.1)",
                          border: "1px solid rgba(245,158,11,0.3)", borderRadius: 7,
                          padding: "8px 14px", fontSize: 11, color: "#fbbf24", fontFamily: "monospace",
                        }}>
                          {"⚠"}{!patientAge.trim() ? "  Age required" : ""}{!patientSpo2.trim() ? "  SpO₂ required" : ""}
                        </div>
                      )}
                    </div>
                  )}
              </div>
            )}
          </div>
        </div>

        {/* ── Validation Panel ── */}
        {validation && (
          <div style={{
            background: "rgba(15,23,42,0.9)", borderRadius: 14,
            border: `1px solid ${validation.errors.length > 0 ? "rgba(239,68,68,0.5)" : validation.warnings.length > 0 ? "rgba(251,191,36,0.4)" : "rgba(34,197,94,0.4)"}`,
            overflow: "hidden",
          }}>
            {/* Header */}
            <div style={{
              padding: "10px 16px", display: "flex", alignItems: "center", gap: 10,
              background: validation.errors.length > 0
                ? "rgba(239,68,68,0.12)"
                : validation.warnings.length > 0
                  ? "rgba(251,191,36,0.1)"
                  : "rgba(34,197,94,0.1)",
              borderBottom: "1px solid rgba(71,85,105,0.3)"
            }}>
              <span style={{ fontSize: 14 }}>
                {validation.errors.length > 0 ? "🚨" : validation.warnings.length > 0 ? "⚠️" : "✅"}
              </span>
              <span style={{ fontSize: 11, fontWeight: 700, fontFamily: "monospace", letterSpacing: "0.1em", color: "#cbd5e1" }}>
                SEGMENTAL RULE ENGINE
              </span>
              <div style={{ marginLeft: "auto", display: "flex", gap: 6 }}>
                {validation.errors.length > 0 && (
                  <span style={{ background: "rgba(239,68,68,0.2)", color: "#fca5a5", borderRadius: 4, padding: "1px 7px", fontSize: 10, fontFamily: "monospace" }}>
                    {validation.errors.length} ERROR{validation.errors.length > 1 ? "S" : ""}
                  </span>
                )}
                {validation.warnings.length > 0 && (
                  <span style={{ background: "rgba(251,191,36,0.15)", color: "#fde68a", borderRadius: 4, padding: "1px 7px", fontSize: 10, fontFamily: "monospace" }}>
                    {validation.warnings.length} WARN
                  </span>
                )}
                {validation.corrections.length > 0 && (
                  <span style={{ background: "rgba(99,102,241,0.2)", color: "#c7d2fe", borderRadius: 4, padding: "1px 7px", fontSize: 10, fontFamily: "monospace" }}>
                    {validation.corrections.length} AUTO-FIX
                  </span>
                )}
                {validation.errors.length === 0 && validation.warnings.length === 0 && (
                  <span style={{ background: "rgba(34,197,94,0.15)", color: "#86efac", borderRadius: 4, padding: "1px 7px", fontSize: 10, fontFamily: "monospace" }}>
                    VALID
                  </span>
                )}
              </div>
            </div>

            <div style={{ padding: "12px 16px", display: "flex", flexDirection: "column", gap: 10 }}>

              {/* Segmental Analysis Summary */}
              {validation.segmentalSummary && (
                <div>
                  <p style={{ margin: "0 0 6px", fontSize: 10, fontWeight: 700, color: "#7dd3fc", fontFamily: "monospace", letterSpacing: "0.1em" }}>
                    SEGMENTAL ANALYSIS (Van Praagh)
                  </p>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 6 }}>
                    {[
                      { label: "① Atrial", data: validation.segmentalSummary.atrial_segment },
                      { label: "② Ventricular", data: validation.segmentalSummary.ventricular_segment },
                      { label: "③ Arterial", data: validation.segmentalSummary.arterial_segment },
                    ].map(seg => (
                      <div key={seg.label} style={{
                        background: "rgba(30,41,59,0.8)", borderRadius: 7, padding: "8px 10px",
                        border: "1px solid rgba(71,85,105,0.3)"
                      }}>
                        <p style={{ margin: "0 0 4px", fontSize: 10, fontWeight: 700, color: "#94a3b8", fontFamily: "monospace" }}>{seg.label}</p>
                        {Object.entries(seg.data).filter(([,v]) => v && v !== "normal" && v !== "concordant" && v !== "D-loop" && v !== "levocardia" && v !== "solitus").map(([k, v]) => (
                          <div key={k} style={{ fontSize: 11, color: "#f59e0b", fontFamily: "monospace" }}>
                            {k.replace(/_/g," ")}: <span style={{ color: "#e2e8f0" }}>{v}</span>
                          </div>
                        ))}
                        {Object.entries(seg.data).every(([,v]) => !v || v === "normal" || v === "concordant" || v === "D-loop" || v === "levocardia" || v === "solitus") && (
                          <div style={{ fontSize: 11, color: "#475569", fontFamily: "monospace", fontStyle: "italic" }}>normal</div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Errors */}
              {validation.errors.length > 0 && (
                <div>
                  <p style={{ margin: "0 0 4px", fontSize: 10, fontWeight: 700, color: "#fca5a5", fontFamily: "monospace", letterSpacing: "0.1em" }}>
                    ANATOMICAL ERRORS
                  </p>
                  {validation.errors.map((e, i) => (
                    <div key={i} style={{ display: "flex", gap: 6, alignItems: "flex-start", marginBottom: 3 }}>
                      <span style={{ color: "#ef4444", fontSize: 11, flexShrink: 0 }}>✕</span>
                      <span style={{ fontSize: 11, color: "#fca5a5", fontFamily: "monospace" }}>{e}</span>
                    </div>
                  ))}
                </div>
              )}

              {/* Warnings */}
              {validation.warnings.length > 0 && (
                <div>
                  <p style={{ margin: "0 0 4px", fontSize: 10, fontWeight: 700, color: "#fde68a", fontFamily: "monospace", letterSpacing: "0.1em" }}>
                    INCOMPLETE ANATOMY
                  </p>
                  {validation.warnings.map((w, i) => (
                    <div key={i} style={{ display: "flex", gap: 6, alignItems: "flex-start", marginBottom: 3 }}>
                      <span style={{ color: "#f59e0b", fontSize: 11, flexShrink: 0 }}>△</span>
                      <span style={{ fontSize: 11, color: "#fde68a", fontFamily: "monospace" }}>{w}</span>
                    </div>
                  ))}
                </div>
              )}

              {/* Auto-corrections */}
              {validation.corrections.length > 0 && (
                <div>
                  <p style={{ margin: "0 0 4px", fontSize: 10, fontWeight: 700, color: "#c7d2fe", fontFamily: "monospace", letterSpacing: "0.1em" }}>
                    AUTO-CORRECTIONS APPLIED
                  </p>
                  {validation.corrections.map((c, i) => (
                    <div key={i} style={{ display: "flex", gap: 6, alignItems: "flex-start", marginBottom: 3 }}>
                      <span style={{ color: "#818cf8", fontSize: 11, flexShrink: 0 }}>⟳</span>
                      <span style={{ fontSize: 11, color: "#c7d2fe", fontFamily: "monospace" }}>{c}</span>
                    </div>
                  ))}
                </div>
              )}

              {validation.errors.length === 0 && validation.warnings.length === 0 && (
                <p style={{ margin: 0, fontSize: 11, color: "#86efac", fontFamily: "monospace" }}>
                  ✓ Anatomy is internally consistent. No segmental conflicts detected.
                </p>
              )}
            </div>
          </div>
        )}

        <p style={{ textAlign: "center", fontSize: 10, color: "#334155", fontFamily: "monospace", letterSpacing: "0.05em", margin: 0 }}>
          RULE-BASED CDSS · GUIDELINE-DERIVED · FOR EDUCATIONAL USE ONLY
        </p>
      </div>
    </div>
  );
}

function LoadingPulse({ text }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "32px 0", justifyContent: "center" }}>
      <div style={{ display: "flex", gap: 4 }}>
        {[0, 1, 2].map(i => (
          <div key={i} style={{
            width: 7, height: 7, borderRadius: "50%", background: "#3b82f6",
            animation: `pulse 1.2s ${i * 0.2}s infinite`,
          }} />
        ))}
      </div>
      <span style={{ color: "#64748b", fontSize: 13, fontFamily: "sans-serif" }}>{text}</span>
      <style>{`@keyframes pulse{0%,80%,100%{opacity:.2;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}`}</style>
    </div>
  );
}

function ErrorMsg({ msg }) {
  return (
    <div style={{ background: "rgba(239,68,68,0.1)", border: "1px solid rgba(239,68,68,0.3)", borderRadius: 7, padding: "10px 14px", color: "#fca5a5", fontSize: 13, fontFamily: "sans-serif" }}>
      ⚠ {msg}
    </div>
  );
}

function EmptyState({ text }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "32px 0", gap: 8 }}>
      <div style={{ fontSize: 32, opacity: 0.15 }}>🫀</div>
      <p style={{ color: "#334155", fontSize: 12, fontFamily: "sans-serif", textAlign: "center", maxWidth: 280, margin: 0 }}>{text}</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<EchoAssistant />);
</script>
</body>
</html>
