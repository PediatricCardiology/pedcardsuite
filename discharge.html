const calcDose=(d,w)=>{
  if(!w||w<=0)return"—";
  const wt=Math.min(w,40);
  if(d.dpk===0)return d.nt?.split(".")[0]||"Fixed dose";
  const fN=d.f.includes("TDS")?3:d.f.includes("QDS")?4:d.f.includes("BD")?2:1;
  let raw=d.pd?(d.dpk*wt)/fN:d.dpk*wt;
  const cap=Math.min(raw,d.mx);
  const r=d.u==="mcg"?Math.round(cap):Math.round(cap*10)/10;
  return`${r} ${d.u}/${d.pd?"day":"dose"} ${d.f}`;
};

// ═══════ CLINICAL DECISION RULES ═══════
const checkClinicalRules=(echoSel,priDx,surgeries,cathProcs,meds)=>{
  const alerts=[];
  const hasSevLVD=echoSel.some(e=>e.includes("severe (EF <30%)")||e.includes("moderate (EF 30-44%)"));
  const hasACEi=meds.some(m=>["Enalapril","Captopril","Ramipril","Losartan","Sacubitril/Valsartan"].includes(m.drug.n));
  const hasBB=meds.some(m=>["Carvedilol","Metoprolol"].includes(m.drug.n));
  const hasProsthetic=surgeries.some(s=>s.includes("replacement")||s.includes("mechanical"));
  const hasDevice=cathProcs.some(c=>c.includes("device")||c.includes("coil")||c.includes("stent"));
  const hasPAH=echoSel.some(e=>e.includes("PAH"));
  const hasSildenafil=meds.some(m=>m.drug.n==="Sildenafil");
  const hasDigoxin=meds.some(m=>m.drug.n==="Digoxin");
  const hasFuro=meds.some(m=>m.drug.n==="Furosemide"||m.drug.n==="Torsemide");
  const hasWarfarin=meds.some(m=>m.drug.n==="Warfarin");
  const isCyanotic=priDx.some(d=>d.includes("TOF")||d.includes("TGA")||d.includes("PA-")||d.includes("Tricuspid Atresia")||d.includes("Ebstein")||d.includes("Single Ventricle")||d.includes("Truncus")||d.includes("HLHS")||d.includes("DORV")||d.includes("TAPVC"));

  if(hasSevLVD&&!hasACEi) alerts.push({type:"warn",msg:"EF <45% — consider adding ACEi/ARB (Enalapril/Losartan)"});
  if(hasSevLVD&&!hasBB) alerts.push({type:"warn",msg:"EF <45% — consider adding Carvedilol (if not acutely decompensated)"});
  if(hasProsthetic&&!hasWarfarin) alerts.push({type:"alert",msg:"Mechanical valve — Warfarin required (INR 2.5-3.5)"});
  if(hasDevice) alerts.push({type:"info",msg:"Post-device — ensure Aspirin prescribed ×6 months. IE prophylaxis required."});
  if(hasPAH&&!hasSildenafil) alerts.push({type:"warn",msg:"PAH documented — consider Sildenafil/Tadalafil if not already on therapy"});
  if(hasDigoxin) alerts.push({type:"info",msg:"On Digoxin — Mon-Fri dosing, weekends off. Level monitoring. Target 0.5-0.9"});
  if(hasFuro) alerts.push({type:"info",msg:"On loop diuretic — ensure K+ & Ca²⁺ supplementation. Monitor electrolytes."});
  if(isCyanotic) alerts.push({type:"info",msg:"Cyanotic CHD — ensure Iron supplementation (3-6mg/kg/day). Monitor Hb for polycythemia."});
  if(hasProsthetic) alerts.push({type:"alert",msg:"Prosthetic material — IE prophylaxis REQUIRED lifelong"});
  return alerts;
};

  const ACT=["No restrictions","Avoid strenuous 4wk","Avoid strenuous 6wk","Avoid contact sports","No competitive sports","Light activity only","Avoid lifting 6wk","Gradual return","No swimming 4wk","School — resume 2wk","School — resume 4wk","School — resume 6wk","Avoid isometric exercise","Avoid altitude >2500m"];
  const DIET=["Normal age-appropriate","High-calorie dense","Calorie-enriched EBM","MCT formula (chylothorax)","Low-fat (chylothorax)","Fluid restriction","Salt restriction","Small frequent feeds","NG if oral inadequate","Iron-rich diet","Adequate protein","Continue Vitamin D"];
  const OTHER=["Monthly weight, 3mo length","Dental hygiene — IE ppx","Avoid crowds during LRTI season","Next surgery at (age/weight)","Staged palliation — next stage","Contact hospital before any procedure","IE prevention card given","Avoid pregnancy (PAH adolescent)","Genetic counseling","Developmental follow-up","Ophthalmology FU","ENT FU","Nephrology FU","Endocarditis prophylaxis wallet card"];
  // Red flags
  const[rfCat,setRfCat]=useState("Post-surgical");const[rfCustom,setRfCustom]=useState([]);
  // Counseling
  const COUNSEL=["Diagnosis explained","Prognosis discussed","Surgery/intervention plan explained","Medication names, doses, timing demonstrated","Red flags explained + handout given","Follow-up schedule explained","IE prophylaxis explained","Feeding/nutrition advice","Growth monitoring explained","Activity restrictions explained","Financial counseling done","Questions answered — parents understand"];
  const[counselSel,setCounselSel]=useState([]);const[counselC,setCounselC]=useState("");

  const wt=parseFloat(pt.wt)||0;

  // Auto-set red flag category
  useEffect(()=>{
    if(pw==="postop")setRfCat("Post-surgical");
    else if(pw==="cath")setRfCat("Post-cath");
    else setRfCat("Heart failure");
  },[pw]);

  // Recalc drug doses on weight change
  useEffect(()=>{if(!wt)return;setMeds(p=>p.map(m=>({...m,calc:calcDose(m.drug,wt)})));},[wt]);

  const addDrug=(d)=>{if(meds.find(m=>m.drug.n===d.n))return;setMeds(p=>[...p,{id:uid(),drug:d,calc:calcDose(d,wt),dur:"",instr:d.nt||""}]);};

  // Smart follow-up auto-populate
  const autoFollowup=useCallback(()=>{
    const keys=Object.keys(FOLLOWUP_RULES);
    for(const k of keys){
      const match=surg.some(s=>k.toLowerCase().split(" ").every(w=>s.toLowerCase().includes(w)))||
        cath.some(c=>k.toLowerCase().split(" ").every(w=>c.toLowerCase().includes(w)))||
        priDx.some(d=>k.toLowerCase().split(" ").every(w=>d.toLowerCase().includes(w)));
      if(match){
        const rule=FOLLOWUP_RULES[k];
        setFuSchedule(rule.schedule);
        setFuInv(rule.inv||[]);
        setFuIE(rule.ie?.includes("Required")?IE_OPT.find(o=>o.includes("Required"))||IE_OPT[1]:"Not required");
        if(rule.activity)setFuAct(rule.activity);
        return k;
      }
    }
    return null;
  },[surg,cath,priDx]);

  // Clinical alerts
  const alerts=useMemo(()=>checkClinicalRules([...ecLV,...ecRV,...ecPAH,...ecOther],priDx,surg,cath,meds),[ecLV,ecRV,ecPAH,ecOther,priDx,surg,cath,meds]);

  // ── STEPS ──
  const STEPS=["Patient","Diagnosis","Complaints","Echo","ECG/CXR/Labs",pw==="postop"?"Surgery":pw==="cath"?"Cath Procedure":"—skip—","Timeline","Course","Discharge","Medications","Follow-up","Red Flags","Counseling","Preview"].filter(s=>s!=="—skip—");

  // ═══ PATHWAY SELECT ═══
  if(!pw){
    const paths=[{key:"postop",icon:"🫀",t:"Post-Operative",d:"ICR, valve, shunt, Glenn, Fontan",c:C.opBdr,bg:C.opBg},{key:"cath",icon:"🩺",t:"Post-Cath",d:"Balloon, device, coil, stent, diagnostic",c:C.cathBdr,bg:C.cathBg},{key:"medical",icon:"💊",t:"Medical",d:"HF, PAH, arrhythmia, IE, Kawasaki, evaluation",c:C.medBdr,bg:C.medBg}];
    return(<div style={{fontFamily:F,background:C.bg,minHeight:"100vh",padding:16,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
      <div style={{fontSize:42,marginBottom:6}}>🫀</div>
      <div style={{fontSize:20,fontWeight:700,color:C.hd,marginBottom:2}}>Pediatric Cardiology</div>
      <div style={{fontSize:13,color:C.mut,marginBottom:20}}>Discharge Summary Generator v3</div>
      {paths.map(p=><div key={p.key} onClick={()=>setPw(p.key)} style={{background:p.bg,border:`2px solid ${p.c}`,borderRadius:12,padding:"14px 18px",marginBottom:8,cursor:"pointer",width:"100%",maxWidth:380}}>
        <div style={{fontSize:20}}>{p.icon} <span style={{fontSize:15,fontWeight:700,color:C.hd}}>{p.t}</span></div>
        <div style={{fontSize:11,color:C.mut}}>{p.d}</div>
      </div>)}
    </div>);
  }

  // ═══ RENDERERS ═══
  const rPatient=()=>(<>{/*Demographics*/}<Sec t="Demographics"><Row><Fd label="Name" value={pt.name} onChange={v=>setPt({...pt,name:v})} placeholder="Full name" style={{flex:2}}/><div style={{flex:1,marginBottom:8}}><label style={sLbl}>Sex</label><div style={{display:"flex",gap:3}}>{["Male","Female","Ambiguous"].map(s=><span key={s} style={sChipStyle(pt.sex===s)} onClick={()=>setPt({...pt,sex:s})}>{s}</span>)}</div></div></Row><Row><Fd label="Age" value={pt.age} onChange={v=>setPt({...pt,age:v})} placeholder="e.g. 8" style={{flex:1}}/><div style={{flex:1,marginBottom:8}}><label style={sLbl}>Unit</label><div style={{display:"flex",gap:2}}>{["days","months","years"].map(u=><span key={u} style={sChipStyle(pt.ageU===u)} onClick={()=>setPt({...pt,ageU:u})}>{u}</span>)}</div></div><Fd label="Weight (kg)" value={pt.wt} onChange={v=>setPt({...pt,wt:v})} type="number" placeholder="kg" style={{flex:1}}/></Row></Sec><Sec t="Hospital Details"><Row><Fd label="IP No" value={pt.ipNo} onChange={v=>setPt({...pt,ipNo:v})} style={{flex:1}}/><Fd label="CR No" value={pt.crNo} onChange={v=>setPt({...pt,crNo:v})} style={{flex:1}}/></Row><Row><Fd label="DOA" value={pt.doa} onChange={v=>setPt({...pt,doa:v})} type="date" style={{flex:1}}/><Fd label="DOD" value={pt.dod} onChange={v=>setPt({...pt,dod:v})} type="date" style={{flex:1}}/></Row><Fd label="Ward" value={pt.ward} onChange={v=>setPt({...pt,ward:v})}/><Row><Fd label="Consultant" value={pt.consultant} onChange={v=>setPt({...pt,consultant:v})} style={{flex:1}}/><Fd label="Resident" value={pt.resident} onChange={v=>setPt({...pt,resident:v})} style={{flex:1}}/></Row></Sec></>);

  const rDiagnosis=()=>(<>{Object.entries(DIAGNOSES).map(([cat,items])=><Sec key={cat} t={cat}><Chips items={items} sel={priDx} onTog={v=>tog(priDx,setPriDx,v)}/></Sec>)}<Fd label="Custom / Additional" value={priDxC} onChange={setPriDxC} placeholder="e.g. Large pmVSD with bidirectional shunt, severe PAH" rows={2}/><Sec t="Associated Anomalies"><Chips items={ASSOC_ANOM} sel={assoc} onTog={v=>tog(assoc,setAssoc,v)}/></Sec><Sec t="Syndromes"><Chips items={SYNDROMES} sel={syn} onTog={v=>tog(syn,setSyn,v)}/></Sec><Sec t="Non-Cardiac"><Chips items={NON_CARDIAC} sel={nonC} onTog={v=>tog(nonC,setNonC,v)}/></Sec><Sec t="Prior Surgeries/Interventions"><Fd label="" value={priorSx} onChange={setPriorSx} placeholder="e.g. PA band (2024), BAS at birth" rows={2}/></Sec></>);

  const rComplaints=()=>(<><Sec t="Acute/Symptoms"><Chips items={COMPLAINTS.acute} sel={compl} onTog={v=>tog(compl,setCompl,v)}/></Sec><Sec t="Planned/Elective"><Chips items={COMPLAINTS.planned} sel={compl} onTog={v=>tog(compl,setCompl,v)}/></Sec><Fd label="Additional" value={complC} onChange={setComplC} placeholder="Duration, severity" rows={2}/></>);

  const rEcho=()=>(<><Sec t="Situs"><Chips items={ECHO.situs} sel={ecSitus} onTog={v=>tog(ecSitus,setEcSitus,v)}/></Sec><Sec t="AV Connection"><Chips items={ECHO.avConn} sel={ecAV} onTog={v=>tog(ecAV,setEcAV,v)}/></Sec><Sec t="VA Connection"><Chips items={ECHO.vaConn} sel={ecVA} onTog={v=>tog(ecVA,setEcVA,v)}/></Sec><Sec t="LV Function"><Chips items={ECHO.lvFunc} sel={ecLV} onTog={v=>tog(ecLV,setEcLV,v)}/><Fd label="EF% (if measured)" value={ecEF} onChange={setEcEF} placeholder="e.g. 35" type="number"/></Sec><Sec t="RV Function"><Chips items={ECHO.rvFunc} sel={ecRV} onTog={v=>tog(ecRV,setEcRV,v)}/></Sec><Sec t="Shunt"><Chips items={ECHO.shunt} sel={ecShunt} onTog={v=>tog(ecShunt,setEcShunt,v)}/></Sec><Sec t="Pulmonary Artery Pressure"><Chips items={ECHO.pah} sel={ecPAH} onTog={v=>tog(ecPAH,setEcPAH,v)}/></Sec><Sec t="Valves"><Chips items={ECHO.valves} sel={ecValve} onTog={v=>tog(ecValve,setEcValve,v)}/></Sec><Sec t="Other Findings"><Chips items={ECHO.other} sel={ecOther} onTog={v=>tog(ecOther,setEcOther,v)}/></Sec><Fd label="Custom Echo" value={ecCustom} onChange={setEcCustom} placeholder="Additional findings" rows={2}/></>);

  const rInv=()=>(<><Sec t="ECG"><Chips items={ECG} sel={ecgSel} onTog={v=>tog(ecgSel,setEcgSel,v)}/></Sec><Sec t="CXR"><Chips items={CXR} sel={cxrSel} onTog={v=>tog(cxrSel,setCxrSel,v)}/></Sec><Sec t="Labs">{Object.entries(LABS).map(([cat,items])=><div key={cat}><div style={{fontSize:10,fontWeight:600,color:C.hdL,margin:"4px 0 2px",fontFamily:F}}>{cat}</div><Chips items={items} sel={labSel} onTog={v=>tog(labSel,setLabSel,v)}/></div>)}</Sec><Fd label="Custom Lab Values" value={labC} onChange={setLabC} placeholder="Hb 9.2, CRP 48, BC: Staph aureus" rows={2}/>{(pw==="cath"||cathData)&&<Sec t="Cath Hemodynamics"><Fd label="" value={cathData} onChange={setCathData} placeholder="Qp:Qs, PVR, PVRI, saturations, gradients" rows={3}/></Sec>}<Sec t="Other Investigations"><Fd label="" value={invOther} onChange={setInvOther} placeholder="CT angio, MRI, genetics, metabolic, Holter" rows={2}/></Sec></>);

  const rSurgery=()=>(<>{Object.entries(SURGERIES).map(([cat,items])=><Sec key={cat} t={cat}><Chips items={items} sel={surg} onTog={v=>tog(surg,setSurg,v)}/></Sec>)}<Fd label="Details" value={surgC} onChange={setSurgC} placeholder="Specific findings, approach" rows={2}/><Row><Fd label="Date" value={surgDt} onChange={setSurgDt} type="date" style={{flex:1}}/><Fd label="CPB (min)" value={cpb} onChange={setCpb} type="number" style={{flex:1}}/><Fd label="ACC (min)" value={acc} onChange={setAcc} type="number" style={{flex:1}}/></Row><span style={sChipStyle(dhca)} onClick={()=>setDhca(!dhca)}>{dhca?"✓ ":""}DHCA used</span></>);

  const rCath=()=>(<>{Object.entries(CATH_PROCS).map(([cat,items])=><Sec key={cat} t={cat}><Chips items={items} sel={cath} onTog={v=>tog(cath,setCath,v)}/></Sec>)}<Fd label="Details" value={cathC} onChange={setCathC} placeholder="Device size, gradients pre/post" rows={2}/><Fd label="Date" value={cathDt} onChange={setCathDt} type="date"/><Sec t="Access Site"><Chips items={ACCESS} sel={accSite} onTog={v=>tog(accSite,setAccSite,v)}/></Sec></>);

  // ═══ TIMELINE BUILDER ═══
  const rTimeline=()=>(<><Sec t="Day-wise Timeline Builder">
    <div style={{display:"flex",gap:6,marginBottom:8,alignItems:"flex-end"}}>
      <Fd label="Day" value={tlDay} onChange={setTlDay} type="number" style={{width:60,flex:"none",marginBottom:0}}/>
      <div style={{flex:1,marginBottom:0}}><label style={sLbl}>Event</label><select value={tlCustom} onChange={e=>setTlCustom(e.target.value)} style={{...sInput}}>
        <option value="">Select event...</option>{TIMELINE_EVENTS.map(e=><option key={e} value={e}>{e}</option>)}
      </select></div>
      <button onClick={()=>{if(tlCustom){setTimeline(p=>[...p,{id:uid(),day:tlDay,event:tlCustom}]);setTlCustom("");}}} style={{padding:"7px 12px",background:C.hdL,color:"#fff",border:"none",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:F,marginBottom:0,whiteSpace:"nowrap"}}>+ Add</button>
    </div>
    <div style={{display:"flex",gap:6,marginBottom:8}}>
      <input value={tlCustom} onChange={e=>setTlCustom(e.target.value)} placeholder="Or type custom event..." style={{...sInput,flex:1}}/>
    </div>
    {timeline.length>0&&<div style={{background:C.inp,borderRadius:8,padding:8,marginBottom:8}}>
      {timeline.sort((a,b)=>a.day-b.day).map(t=><div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"3px 0",borderBottom:`1px solid ${C.bdr}`}}>
        <span style={{fontSize:11,fontFamily:F}}><span style={{fontWeight:700,color:C.blu,fontFamily:FM}}>Day {t.day}</span> — {t.event}</span>
        <span onClick={()=>setTimeline(p=>p.filter(x=>x.id!==t.id))} style={{cursor:"pointer",color:C.acc,fontWeight:700,fontSize:14}}>×</span>
      </div>)}
    </div>}
    <div style={{fontSize:10,color:C.mut,fontFamily:F}}>💡 Smart phrases: "Hemodynamically stable throughout", "Weaned off ventilator on Day X", "ICU → Ward transition Day X"</div>
  </Sec></>);

  const rCourse=()=>{
    const DATA=pw==="postop"?POSTOP_COURSE:pw==="cath"?POSTCATH_COURSE:MEDICAL_COURSE;
    return(<>{Object.entries(DATA).map(([cat,items])=><Sec key={cat} t={cat}><Chips items={items} sel={courseSel} onTog={v=>tog(courseSel,setCourseSel,v)}/></Sec>)}<Fd label="Additional notes (optional)" value={courseC} onChange={setCourseC} placeholder="Free text" rows={2}/>{pw==="postop"&&<Row><Fd label="ICU Days" value={icuD} onChange={setIcuD} type="number" style={{flex:1}}/><Fd label="Ventilation Days" value={ventD} onChange={setVentD} type="number" style={{flex:1}}/></Row>}</>);
  };

  const rDischarge=()=>(<><Sec t="Vitals"><Row><Fd label="HR" value={dc.hr} onChange={v=>setDc({...dc,hr:v})} placeholder="/min" style={{flex:1}}/><Fd label="RR" value={dc.rr} onChange={v=>setDc({...dc,rr:v})} placeholder="/min" style={{flex:1}}/><Fd label="SpO₂%" value={dc.spo2} onChange={v=>setDc({...dc,spo2:v})} style={{flex:1}}/></Row><Row><div style={{flex:1,marginBottom:8}}><label style={sLbl}>SpO₂ on</label><div style={{display:"flex",flexWrap:"wrap",gap:2}}>{["Room air","O₂ 0.25L","O₂ 0.5L","O₂ 1L","O₂ 2L"].map(o=><span key={o} style={sChipStyle(dc.spo2On===o)} onClick={()=>setDc({...dc,spo2On:o})}>{o}</span>)}</div></div><Fd label="BP" value={dc.bp} onChange={v=>setDc({...dc,bp:v})} placeholder="mmHg" style={{flex:1}}/></Row></Sec><Sec t="Feeding"><Chips items={DC_FEED} sel={[dc.feeding]} onTog={v=>setDc({...dc,feeding:dc.feeding===v?"":v})}/></Sec><Sec t="Condition"><Chips items={DC_ACT} sel={[dc.activity]} onTog={v=>setDc({...dc,activity:dc.activity===v?"":v})}/></Sec><Fd label="Weight at Discharge (kg)" value={dc.wtDc} onChange={v=>setDc({...dc,wtDc:v})} type="number"/></>);

  const rMeds=()=>{
    const filtered=drugSearch?DRUGS.filter(d=>d.n.toLowerCase().includes(drugSearch.toLowerCase())||d.b.toLowerCase().includes(drugSearch.toLowerCase())||d.cat.toLowerCase().includes(drugSearch.toLowerCase())):DRUGS;
    const grouped={};filtered.forEach(d=>{(grouped[d.cat]=grouped[d.cat]||[]).push(d);});
    return(<>
      {alerts.length>0&&<div style={{marginBottom:10}}>
        {alerts.map((a,i)=><div key={i} style={{padding:"6px 10px",borderRadius:6,marginBottom:3,fontSize:11,fontFamily:F,background:a.type==="alert"?C.accSoft:a.type==="warn"?C.warnBg:C.bluBg,border:`1px solid ${a.type==="alert"?C.acc:a.type==="warn"?C.warn:C.blu}`,color:C.txt}}>
          <span style={{fontWeight:700}}>{a.type==="alert"?"🚨":"⚡"}</span> {a.msg}
        </div>)}
      </div>}
      <Sec t={`Drug Formulary${wt?` — ${wt}kg`:" — Enter weight"}`}>
        <Fd label="Search" value={drugSearch} onChange={setDrugSearch} placeholder="Drug, brand, or category..."/>
        {Object.entries(grouped).map(([cat,drugs])=><div key={cat} style={{marginBottom:6}}>
          <div style={{fontSize:9,fontWeight:700,color:C.mut,textTransform:"uppercase",marginBottom:2,fontFamily:F}}>{cat}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:2}}>{drugs.map(d=>{const on=meds.find(m=>m.drug.n===d.n);return<span key={d.n} onClick={()=>!on&&addDrug(d)} style={{...sChipStyle(!!on),background:on?C.grnBg:C.tag,color:on?C.grn:C.txt,borderColor:on?C.grn:C.bdr,fontSize:10}}>{on?"✓ ":"+ "}{d.n} <span style={{fontSize:8,opacity:0.7}}>({d.b.split("/")[0]})</span></span>})}</div>
        </div>)}
      </Sec>
      {meds.length>0&&<Sec t="Selected Medications">
        {meds.map((m,i)=><div key={m.id} style={{background:i%2===0?"#fafbfc":"#fff",padding:"6px 8px",borderRadius:6,marginBottom:3,border:`1px solid ${C.bdr}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><span style={{fontSize:12,fontWeight:700,color:C.hd}}>{i+1}. {m.drug.n}</span><span style={{fontSize:10,color:C.mut}}> ({m.drug.b})</span>
            <div style={{fontSize:11,color:C.grn,fontWeight:600}}>→ {m.calc} — {m.drug.r}</div>
            {m.drug.dil&&<div style={{fontSize:9,color:C.blu}}>💧 {m.drug.dil}</div>}
            {m.drug.tabs&&<div style={{fontSize:9,color:C.mut}}>💊 Tabs: {m.drug.tabs.join(", ")}mg</div>}
            {m.drug.combo&&<div style={{fontSize:9,color:"#7c3aed"}}>🔗 {m.drug.combo}</div>}
            </div><span onClick={()=>setMeds(p=>p.filter(x=>x.id!==m.id))} style={{cursor:"pointer",color:C.acc,fontWeight:700,fontSize:14}}>×</span>
          </div>
          <Row gap={4}><Fd label="Duration" value={m.dur} onChange={v=>setMeds(p=>p.map(x=>x.id===m.id?{...x,dur:v}:x))} placeholder="e.g. 4wk" style={{flex:1,marginBottom:0,marginTop:3}}/><Fd label="Instructions" value={m.instr} onChange={v=>setMeds(p=>p.map(x=>x.id===m.id?{...x,instr:v}:x))} placeholder="Special instructions" style={{flex:2,marginBottom:0,marginTop:3}}/></Row>
        </div>)}
      </Sec>}
      <Sec t="Custom Medications">
        {customMeds.map(m=><div key={m.id} style={{padding:6,borderRadius:6,marginBottom:3,border:`1px dashed ${C.bdr}`}}>
          <Row gap={4}><Fd label="Drug" value={m.name} onChange={v=>setCustomMeds(p=>p.map(x=>x.id===m.id?{...x,name:v}:x))} placeholder="Name (brand)" style={{flex:2,marginBottom:0}}/><Fd label="Dose" value={m.dose} onChange={v=>setCustomMeds(p=>p.map(x=>x.id===m.id?{...x,dose:v}:x))} placeholder="5mg BD PO" style={{flex:1,marginBottom:0}}/><Fd label="Duration" value={m.dur} onChange={v=>setCustomMeds(p=>p.map(x=>x.id===m.id?{...x,dur:v}:x))} placeholder="2wk" style={{flex:1,marginBottom:0}}/><span onClick={()=>setCustomMeds(p=>p.filter(x=>x.id!==m.id))} style={{cursor:"pointer",color:C.acc,fontWeight:700,alignSelf:"center",marginTop:12}}>×</span></Row>
        </div>)}
        <div onClick={()=>setCustomMeds(p=>[...p,{id:uid(),name:"",dose:"",dur:""}])} style={{padding:6,textAlign:"center",border:`1px dashed ${C.bdr}`,borderRadius:6,color:C.mut,cursor:"pointer",fontSize:11,fontFamily:F}}>+ Add Custom Medication</div>
      </Sec>
    </>);
  };

  const rFollowup=()=>{
    const matched=autoFollowup();
    return(<>
      {matched&&<div style={{background:C.grnBg,border:`1px solid ${C.grn}`,borderRadius:6,padding:8,marginBottom:8,fontSize:11,fontFamily:F}}>
        <span style={{fontWeight:700}}>🧠 Smart Follow-up: </span>Matched "{matched}"
      </div>}
      {fuSchedule&&<div style={{background:C.bluBg,border:`1px solid ${C.blu}`,borderRadius:6,padding:8,marginBottom:8,fontSize:11,fontFamily:F}}>
        <span style={{fontWeight:700}}>📅 Schedule: </span>{fuSchedule}
      </div>}
      <Fd label="Next OPD Date" value={fuDate} onChange={setFuDate} type="date"/>
      <Sec t="Investigations Before FU"><Chips items={FU_INV} sel={fuInv} onTog={v=>tog(fuInv,setFuInv,v)}/></Sec>
      <Sec t="IE Prophylaxis"><Chips items={IE_OPT} sel={[fuIE]} onTog={v=>setFuIE(fuIE===v?"Not required":v)}/></Sec>
      <Sec t="Vaccines"><Chips items={VAX} sel={fuVax} onTog={v=>tog(fuVax,setFuVax,v)}/></Sec>
      <Sec t="Activity"><Chips items={ACT} sel={fuAct} onTog={v=>tog(fuAct,setFuAct,v)}/></Sec>
      <Sec t="Diet"><Chips items={DIET} sel={fuDiet} onTog={v=>tog(fuDiet,setFuDiet,v)}/></Sec>
      <Sec t="Other Advice"><Chips items={OTHER} sel={fuOther} onTog={v=>tog(fuOther,setFuOther,v)}/></Sec>
    </>);
  };

  const rRedFlags=()=>{const cats=Object.keys(RED_FLAGS);const flags=RED_FLAGS[rfCat]||[];return(<><Sec t="Category"><Chips items={cats} sel={[rfCat]} onTog={v=>setRfCat(v)}/></Sec><div style={{background:C.accSoft,padding:8,borderRadius:6,marginBottom:6,border:"1px solid #f5b7b1"}}>{flags.map((f,i)=><div key={i} style={{fontSize:11,padding:"2px 0",fontFamily:F}}><span style={{color:C.acc,fontWeight:700}}>⚠{i+1}.</span> {f}</div>)}</div><Sec t="Custom Red Flags">{rfCustom.map((f,i)=><div key={i} style={{display:"flex",gap:4,marginBottom:3}}><input value={f} onChange={e=>{const a=[...rfCustom];a[i]=e.target.value;setRfCustom(a);}} style={{...sInput,flex:1}} placeholder="Custom red flag"/><span onClick={()=>setRfCustom(p=>p.filter((_,j)=>j!==i))} style={{cursor:"pointer",color:C.acc,fontWeight:700}}>×</span></div>)}<div onClick={()=>setRfCustom(p=>[...p,""])} style={{padding:5,textAlign:"center",border:`1px dashed ${C.bdr}`,borderRadius:6,color:C.mut,cursor:"pointer",fontSize:11}}>+ Add</div></Sec></>);};

  const rCounseling=()=>(<><Sec t="Points Discussed"><Chips items={COUNSEL} sel={counselSel} onTog={v=>tog(counselSel,setCounselSel,v)}/></Sec><Fd label="Additional" value={counselC} onChange={setCounselC} placeholder="Specific points" rows={2}/></>);

  // ═══ GENERATE ═══
  const buildText=()=>{
    const allDx=[...priDx,priDxC].filter(Boolean).join(", ");
    const allCompl=[...compl,complC].filter(Boolean).join(", ");
    const echoLines=[...ecSitus,...ecAV,...ecVA,...ecLV,...ecRV,...ecShunt,...ecPAH,...ecValve,...ecOther].filter(Boolean);
    if(ecEF)echoLines.push(`EF: ${ecEF}%`);
    if(ecCustom)echoLines.push(ecCustom);
    const allCourse=[...courseSel,courseC].filter(Boolean);
    const allMeds=[...meds.map(m=>`${m.drug.n} (${m.drug.b}) — ${m.calc} — ${m.drug.r}${m.dur?` — ${m.dur}`:""}${m.drug.dil?` [Prep: ${m.drug.dil}]`:""}${m.instr?` [${m.instr}]`:""}`),
      ...customMeds.filter(m=>m.name).map(m=>`${m.name} — ${m.dose}${m.dur?` — ${m.dur}`:""}`)];
    const allRF=[...(RED_FLAGS[rfCat]||[]),...rfCustom.filter(Boolean)];
    const allCounsel=[...counselSel,counselC].filter(Boolean).join("; ");
    let proc="";
    if(pw==="postop")proc=`SURGERY: ${[...surg,surgC].filter(Boolean).join(", ")}${surgDt?` | Date: ${surgDt}`:""}${cpb?` | CPB: ${cpb}min`:""}${acc?` | ACC: ${acc}min`:""}${dhca?" | DHCA":""}`;
    else if(pw==="cath")proc=`CATH PROCEDURE: ${[...cath,cathC].filter(Boolean).join(", ")}${cathDt?` | Date: ${cathDt}`:""}${accSite.length?` | Access: ${accSite.join(", ")}`:""}`;

    return`DISCHARGE SUMMARY
${"═".repeat(50)}

PATIENT: ${pt.name||"[Name]"} | ${pt.age} ${pt.ageU} | ${pt.sex} | Wt: ${pt.wt||"—"}kg
IP: ${pt.ipNo} | CR: ${pt.crNo} | DOA: ${pt.doa} | DOD: ${pt.dod}
Ward: ${pt.ward} | Consultant: ${pt.consultant} | Resident: ${pt.resident}

DIAGNOSIS
${allDx||"—"}
${assoc.length?`Associated: ${assoc.join(", ")}`:""}
${syn.filter(s=>s!=="None").length?`Syndrome: ${syn.filter(s=>s!=="None").join(", ")}`:""}
${nonC.filter(s=>s!=="None").length?`Non-cardiac: ${nonC.filter(s=>s!=="None").join(", ")}`:""}
${priorSx?`Prior: ${priorSx}`:""}

PRESENTING COMPLAINTS: ${allCompl||"—"}

ECHOCARDIOGRAPHY
${echoLines.join("; ")||"—"}

ECG: ${ecgSel.join(", ")||"—"}
CXR: ${cxrSel.join(", ")||"—"}
${cathData?`CATH DATA: ${cathData}`:""}
LABS: ${[...labSel,labC].filter(Boolean).join("; ")||"—"}
${invOther?`OTHER: ${invOther}`:""}

${proc}

HOSPITAL COURSE
${timeline.length?timeline.sort((a,b)=>a.day-b.day).map(t=>`Day ${t.day}: ${t.event}`).join("\n"):""}
${allCourse.map(c=>`• ${c}`).join("\n")}
${pw==="postop"&&icuD?`ICU: ${icuD}d | Ventilation: ${ventD||"0"}d`:""}

CONDITION AT DISCHARGE
HR: ${dc.hr||"—"} | RR: ${dc.rr||"—"} | SpO₂: ${dc.spo2||"—"}% on ${dc.spo2On}${dc.bp?` | BP: ${dc.bp}`:""}
Feeding: ${dc.feeding||"—"} | Wt: ${dc.wtDc||"—"}kg | ${dc.activity||"—"}

DISCHARGE MEDICATIONS
${allMeds.length?allMeds.map((m,i)=>`${i+1}. ${m}`).join("\n"):"Nil"}

FOLLOW-UP
${fuSchedule?`Schedule: ${fuSchedule}\n`:""}OPD: ${fuDate||"—"}
Investigations: ${fuInv.join(", ")||"Nil"}
IE Prophylaxis: ${fuIE}
${fuVax.length?`Vaccines: ${fuVax.join("; ")}`:""}
${fuAct.length?`Activity: ${fuAct.join("; ")}`:""}
${fuDiet.length?`Diet: ${fuDiet.join("; ")}`:""}
${fuOther.length?`Other: ${fuOther.join("; ")}`:""}

RED FLAGS — RETURN IMMEDIATELY IF:
${allRF.map((r,i)=>`${i+1}. ${r}`).join("\n")}

COUNSELING: ${allCounsel||"Diagnosis, prognosis, treatment and follow-up explained"}

${"─".repeat(50)}
Consultant: ${pt.consultant||"___"} | Resident: ${pt.resident||"___"}`;
  };

  const generateAI=async()=>{
    setGenerating(true);
    try{const raw=buildText();const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:3000,messages:[{role:"user",content:`Senior pediatric cardiologist at Indian government hospital. Convert this structured data into a polished discharge summary. RULES: Concise & clinical. Hospital course → 3-8 sentence narrative from bullet points + timeline. Medications → numbered list with drug, brand, dose, route, frequency, duration, prep/dilution instructions. Keep section headings in CAPS. Do NOT add info not in data. Red flags → numbered list. Preserve all specifics.\n\nDATA:\n${raw}`}]})});const data=await resp.json();setPreview(data.content?.map(b=>b.text||"").join("")||raw);}catch{setPreview(buildText());}finally{setGenerating(false);}
  };

  const rPreview=()=>(<>{alerts.length>0&&<div style={{marginBottom:8}}>{alerts.map((a,i)=><div key={i} style={{padding:"5px 8px",borderRadius:6,marginBottom:2,fontSize:10,fontFamily:F,background:a.type==="alert"?C.accSoft:a.type==="warn"?C.warnBg:C.bluBg,border:`1px solid ${a.type==="alert"?C.acc:a.type==="warn"?C.warn:C.blu}`}}><b>{a.type==="alert"?"🚨":"⚡"}</b> {a.msg}</div>)}</div>}<div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:10}}>
    <button onClick={()=>setPreview(buildText())} style={{padding:"7px 12px",background:C.hd,color:"#fff",border:"none",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:F}}>📋 Plain</button>
    <button onClick={generateAI} disabled={generating} style={{padding:"7px 12px",background:generating?C.mut:C.grn,color:"#fff",border:"none",borderRadius:6,fontSize:11,fontWeight:600,cursor:generating?"wait":"pointer",fontFamily:F}}>{generating?"⏳ AI...":"🧠 AI Narrative"}</button>
    {preview&&<><button onClick={async()=>{try{await navigator.clipboard.writeText(preview);setCopied(true);setTimeout(()=>setCopied(false),2000);}catch{}}} style={{padding:"7px 12px",background:copied?C.grn:"#fff",color:copied?"#fff":C.hd,border:`1px solid ${copied?C.grn:C.hd}`,borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:F}}>{copied?"✓ Copied":"Copy"}</button>
    <button onClick={()=>{const w=window.open("","_blank");w.document.write(`<html><head><title>Discharge Summary</title><style>body{font-family:Georgia,serif;max-width:780px;margin:30px auto;padding:20px;font-size:13px;line-height:1.7;}pre{white-space:pre-wrap;font-family:Georgia,serif;font-size:13px;}</style></head><body><pre>${preview}</pre></body></html>`);w.document.close();w.print();}} style={{padding:"7px 12px",background:"#fff",color:C.hd,border:`1px solid ${C.hd}`,borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:F}}>🖨️ Print</button></>}
  </div>{preview?<div style={{background:"#fff",border:`1px solid ${C.bdr}`,borderRadius:8,padding:12,whiteSpace:"pre-wrap",fontSize:11,lineHeight:1.7,fontFamily:FM,color:C.txt,maxHeight:460,overflowY:"auto"}}>{preview}</div>:<div style={{textAlign:"center",padding:24,color:C.mut,fontSize:12}}>📋 Generate plain or AI narrative</div>}</>);

  // ═══ STEP MAP ═══
  const renderers=[rPatient,rDiagnosis,rComplaints,rEcho,rInv,...(pw==="postop"?[rSurgery]:pw==="cath"?[rCath]:[]),rTimeline,rCourse,rDischarge,rMeds,rFollowup,rRedFlags,rCounseling,rPreview];
  const pathLabel=pw==="postop"?"Post-Op":pw==="cath"?"Post-Cath":"Medical";
  const pathColor=pw==="postop"?C.opBdr:pw==="cath"?C.cathBdr:C.medBdr;

  return(<div style={{fontFamily:F,background:C.bg,minHeight:"100vh",padding:"8px"}}>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <div style={{background:C.hdG,color:"#fff",padding:"10px 12px",borderRadius:10,marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:22}}>🫀</span><div><div style={{fontSize:13,fontWeight:700}}>Discharge Summary</div><div style={{fontSize:10,opacity:0.8}}>{pathLabel} • v3 + PedCardDose</div></div></div>
      <span onClick={()=>{if(confirm("Switch? Data lost.")){setPw(null);setStep(0);}}} style={{fontSize:10,padding:"3px 8px",background:"rgba(255,255,255,0.15)",borderRadius:6,cursor:"pointer"}}>Switch</span>
    </div>
    <div style={{display:"flex",overflowX:"auto",gap:1,marginBottom:8,background:C.card,borderRadius:8,padding:3}}>
      {STEPS.map((s,i)=><button key={s+i} onClick={()=>setStep(i)} style={{padding:"5px 8px",fontSize:9,fontWeight:step===i?700:500,whiteSpace:"nowrap",background:step===i?C.hd:"transparent",color:step===i?"#fff":C.mut,border:"none",borderRadius:5,cursor:"pointer",fontFamily:F}}>{s}</button>)}
    </div>
    <div style={{background:C.card,borderRadius:10,padding:12,minHeight:260,maxHeight:"68vh",overflowY:"auto",borderTop:`3px solid ${pathColor}`}}>{renderers[step]&&renderers[step]()}</div>
    <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
      <button onClick={()=>setStep(Math.max(0,step-1))} disabled={step===0} style={{padding:"8px 16px",background:step===0?C.tag:"#fff",color:step===0?C.mut:C.hd,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:12,fontWeight:600,cursor:step===0?"default":"pointer",fontFamily:F}}>← Back</button>
      {step<renderers.length-1&&<button onClick={()=>setStep(step+1)} style={{padding:"8px 16px",background:C.hd,color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:F}}>Next →</button>}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
