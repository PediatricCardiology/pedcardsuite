<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<meta name="apple-mobile-web-app-capable" content="yes" />

    background: #0f1117;

    -webkit-tap-highlight-color: transparent;

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useCallback } = React;
/* ═══════════════════════════════════════════════════════════
   DEFECT DEFINITIONS — each is an independent SVG overlay
   ═══════════════════════════════════════════════════════════ */
const DEFECTS = {
  vsd:     { name:"VSD", full:"Ventricular Septal Defect", group:"Septal", color:"#d44",
             desc:"Hole in the wall between the two lower chambers. Extra blood flows left→right, flooding the lungs.",
             fix:"Patch closure of the VSD with fabric or pericardial tissue." },
  asd:     { name:"ASD", full:"Atrial Septal Defect", group:"Septal", color:"#d44",
             desc:"Hole in the wall between the two upper chambers. Extra blood flows left→right, overloading the right heart.",
             fix:"Patch closure (surgical) or catheter device closure." },
  ps:      { name:"PS", full:"Pulmonary Stenosis", group:"Obstructive", color:"#e07020",
             desc:"Pulmonary valve/RVOT is narrowed. RV must squeeze harder to push blood to the lungs.",
             fix:"Balloon valvuloplasty or surgical relief of RVOT obstruction." },
  as:      { name:"AS", full:"Aortic Stenosis", group:"Obstructive", color:"#e07020",
             desc:"Aortic valve is narrowed. LV must squeeze much harder to push blood to the body. LV muscle thickens.",
             fix:"Balloon valvuloplasty or surgical valve repair/replacement." },
  pda:     { name:"PDA", full:"Patent Ductus Arteriosus", group:"Connections", color:"#9b6bb0",
             desc:"Fetal vessel between aorta and PA stays open after birth. Extra blood flows aorta→PA, flooding lungs.",
             fix:"Catheter coil/plug or surgical ligation to close the ductus." },
  coa:     { name:"CoA", full:"Coarctation of Aorta", group:"Obstructive", color:"#e07020",
             desc:"Narrowing in the descending aorta. High BP in arms, low BP and weak pulses in legs.",
             fix:"End-to-end surgical repair or balloon dilation." },
  ebstein: { name:"Ebstein", full:"Ebstein's Anomaly", group:"Valve", color:"#c040a0",
             desc:"Tricuspid valve displaced downward into RV. Part of RV becomes 'atrialized' and small. TV leaks.",
             fix:"Cone repair: leaflets detached, rotated and reattached at true annulus. Atrialized RV plicated." },
  tga:     { name:"d-TGA", full:"d-Transposition of Great Arteries", group:"Complex", color:"#2070c0",
             desc:"Aorta and PA are swapped. Aorta from RV (blue→body), PA from LV (red→lungs). Two parallel loops.",
             fix:"Arterial Switch Operation (Jatene): arteries cut and reconnected correctly. Coronaries transferred." },
  tapvr:   { name:"TAPVR", full:"Total Anomalous Pulmonary Venous Return", group:"Complex", color:"#2070c0",
             desc:"All pulmonary veins drain to the right atrium instead of left. Body gets mixed blood. Child is blue.",
             fix:"Pulmonary veins redirected to drain into the left atrium. ASD closed." },
  avsd:    { name:"AVSD", full:"AV Septal Defect (Complete)", group:"Septal", color:"#d44",
             desc:"Large central hole with a common AV valve instead of separate mitral and tricuspid. Blood mixes freely.",
             fix:"Patch ASD+VSD components, divide common valve into two separate valves (TV and MV)." },
};

const DEFECT_IDS = Object.keys(DEFECTS);

/* ═══════════════════════════════════════════════════════════
   PRESETS — common clinical combinations
   ═══════════════════════════════════════════════════════════ */
const PRESETS = [
  { label:"Normal Heart", ids:[], desc:"Healthy four-chamber anatomy" },
  { label:"Isolated VSD", ids:["vsd"] },
  { label:"Isolated ASD", ids:["asd"] },
  { label:"VSD + ASD", ids:["vsd","asd"] },
  { label:"TOF (VSD+PS)", ids:["vsd","ps"], desc:"Tetralogy of Fallot physiology" },
  { label:"VSD + PDA", ids:["vsd","pda"] },
  { label:"VSD + PS + PDA", ids:["vsd","ps","pda"] },
  { label:"VSD + CoA", ids:["vsd","coa"] },
  { label:"VSD + CoA + PDA", ids:["vsd","coa","pda"] },
  { label:"ASD + PS", ids:["asd","ps"] },
  { label:"Complete AVSD", ids:["avsd"] },
  { label:"AVSD + PDA", ids:["avsd","pda"] },
  { label:"Ebstein + ASD", ids:["ebstein","asd"] },
  { label:"Ebstein + VSD", ids:["ebstein","vsd"] },
  { label:"d-TGA", ids:["tga"] },
  { label:"d-TGA + VSD", ids:["tga","vsd"] },
  { label:"d-TGA + VSD + PS", ids:["tga","vsd","ps"] },
  { label:"TAPVR", ids:["tapvr"] },
  { label:"CoA + VSD + PDA", ids:["coa","vsd","pda"] },
  { label:"CoA + AS", ids:["coa","as"] },
  { label:"AS + AR", ids:["as"], desc:"Aortic stenosis" },
  { label:"Custom...", ids:null, desc:"Build your own combination" },
];

/* ═══════════════════════════════════════════════════════════
   SVG CONSTANTS & PRIMITIVES
   ═══════════════════════════════════════════════════════════ */
const K = {
  B:"#4a8fd9", R:"#e24545", P:"#9b6bb0", G:"#3da03d",
  WS:"#8b7355", bgB:"#d4e4f4", bgR:"#f4d4d8", bgM:"#e4d8f0",
};
const HX=80,HY=65,HW=160,HH=180,SEP=160,AV=148,BOT=245;

const Tx = ({x,y,t,c="#333",s=11,b,a="middle"}) => (
  <text x={x} y={y} textAnchor={a} fill={c} fontSize={s} fontWeight={b?700:500} fontFamily="'IBM Plex Mono',monospace">{t}</text>
);

const Arr = ({pts,c,lab,lp}) => {
  const d=pts.map((p,i)=>`${i?"L":"M"}${p[0]},${p[1]}`).join(" ");
  const[a,b]=[pts[pts.length-2],pts[pts.length-1]];
  const ang=Math.atan2(b[1]-a[1],b[0]-a[0]),sz=6;
  return(<g>
    <path d={d} fill="none" stroke={c} strokeWidth={2.2} strokeLinecap="round" strokeLinejoin="round" opacity={.75} strokeDasharray="7,4">
      <animate attributeName="stroke-dashoffset" from="44" to="0" dur="2s" repeatCount="indefinite"/>
    </path>
    <polygon points={`${b[0]},${b[1]} ${b[0]-sz*Math.cos(ang-.4)},${b[1]-sz*Math.sin(ang-.4)} ${b[0]-sz*Math.cos(ang+.4)},${b[1]-sz*Math.sin(ang+.4)}`} fill={c} opacity={.75}/>
    {lab&&lp&&<Tx x={lp[0]} y={lp[1]} t={lab} c={c} s={8} b/>}
  </g>);
};

/* ═══════════════════════════════════════════════════════════
   BASE HEART + PER-DEFECT OVERLAY LAYERS
   ═══════════════════════════════════════════════════════════ */

// Chamber fill colors based on active defects
function getChamberColors(active, post) {
  let ra=K.bgB, la=K.bgR, rv=K.bgB, lv=K.bgR;
  if (post) return {ra,la,rv,lv};
  if (active.has("vsd")) rv = K.bgM;
  if (active.has("asd")) ra = K.bgM;
  if (active.has("avsd")) { ra=K.bgM; rv=K.bgM; la="#f0d8e8"; lv="#f0d8e8"; }
  if (active.has("tapvr")) { ra=K.bgM; la="#e8e8e8"; }
  if (active.has("ebstein") && !post) { rv="#e8ddf4"; }
  return {ra,la,rv,lv};
}

const BaseHeart = ({active, post}) => {
  const cc = getChamberColors(active, post);
  const isAVSD = active.has("avsd") && !post;
  const isEbst = active.has("ebstein") && !post;
  return (<g>
    {/* Chamber fills */}
    <rect x={HX+2} y={HY+2} width={SEP-HX-2} height={AV-HY-2} fill={cc.ra} opacity={.45}/>
    <rect x={SEP+2} y={HY+2} width={HX+HW-SEP-2} height={AV-HY-2} fill={cc.la} opacity={.45}/>
    {isEbst ? (<>
      <rect x={HX+2} y={AV+2} width={SEP-HX-2} height={35} fill={cc.rv} opacity={.2}/>
      <rect x={HX+2} y={AV+37} width={SEP-HX-2} height={BOT-AV-37} fill={cc.rv} opacity={.45}/>
    </>) : (
      <rect x={HX+2} y={AV+2} width={SEP-HX-2} height={BOT-AV-2} fill={cc.rv} opacity={.45}/>
    )}
    <rect x={SEP+2} y={AV+2} width={HX+HW-SEP-2} height={BOT-AV-2} fill={cc.lv} opacity={.45}/>

    {/* Walls */}
    <rect x={HX} y={HY} width={HW} height={HH} fill="none" stroke={K.WS} strokeWidth={3}/>
    {isAVSD ? (<>
      <line x1={SEP} y1={HY} x2={SEP} y2={93} stroke={K.WS} strokeWidth={3}/>
      <line x1={SEP} y1={172} x2={SEP} y2={BOT} stroke={K.WS} strokeWidth={3}/>
      <line x1={HX} y1={AV} x2={128} y2={AV} stroke={K.WS} strokeWidth={2.5}/>
      <line x1={192} y1={AV} x2={HX+HW} y2={AV} stroke={K.WS} strokeWidth={2.5}/>
    </>) : (<>
      <line x1={SEP} y1={HY} x2={SEP} y2={BOT} stroke={K.WS} strokeWidth={3}/>
      <line x1={HX} y1={AV} x2={HX+HW} y2={AV} stroke={K.WS} strokeWidth={2.5}/>
    </>)}

    {/* Veins — TAPVR changes PV routing */}
    <line x1={42} y1={85} x2={HX} y2={98} stroke={K.B} strokeWidth={5} strokeLinecap="round"/>
    <Tx x={36} y={83} t="SVC" c={K.B} s={8} b a="end"/>
    <line x1={42} y1={132} x2={HX} y2={128} stroke={K.B} strokeWidth={5} strokeLinecap="round"/>
    <Tx x={36} y={135} t="IVC" c={K.B} s={8} b a="end"/>
    {active.has("tapvr") && !post ? (<>
      <path d="M278,90 Q278,105 260,118 L200,130 Q160,135 120,125 L82,108" fill="none" stroke={K.R} strokeWidth={4} strokeLinecap="round"/>
      <Tx x={284} y={88} t="PV" c={K.R} s={8} b a="start"/>
      <Tx x={SEP} y={80} t="PVs→RA" c="#d44" s={8} b/>
    </>) : (<>
      <line x1={278} y1={90} x2={HX+HW} y2={100} stroke={K.R} strokeWidth={5} strokeLinecap="round"/>
      <Tx x={284} y={88} t="PV" c={K.R} s={8} b a="start"/>
      <line x1={278} y1={125} x2={HX+HW} y2={122} stroke={K.R} strokeWidth={5} strokeLinecap="round"/>
    </>)}

    {/* Great arteries — from ventricles */}
    {active.has("tga") && !post ? (<>
      <path d="M125,148 L125,42 Q125,28 110,22 L72,12" fill="none" stroke={K.R} strokeWidth={7} strokeLinecap="round"/>
      <Tx x={62} y={14} t="Ao" c={K.R} s={10} b a="end"/>
      <path d="M195,148 L195,42 Q195,28 210,22 L248,12" fill="none" stroke={K.B} strokeWidth={7} strokeLinecap="round"/>
      <Tx x={256} y={14} t="PA" c={K.B} s={10} b a="start"/>
    </>) : (<>
      {!active.has("coa") ? (
        <path d="M195,148 L195,42 Q195,28 210,22 L248,12" fill="none" stroke={K.R} strokeWidth={7} strokeLinecap="round"/>
      ) : null}
      <path d="M125,148 L125,42 Q125,28 110,22 L72,12" fill="none" stroke={K.B} strokeWidth={7} strokeLinecap="round"/>
      <Tx x={62} y={14} t="PA" c={K.B} s={10} b a="end"/>
      {!active.has("coa") && <Tx x={256} y={14} t="Ao" c={K.R} s={10} b a="start"/>}
    </>)}

    {/* Chamber labels */}
    <Tx x={120} y={114} t="RA" c={K.B} s={13} b/>
    <Tx x={200} y={114} t="LA" c={K.R} s={13} b/>
    <Tx x={120} y={205} t="RV" c={K.B} s={13} b/>
    <Tx x={200} y={205} t="LV" c={K.R} s={13} b/>
  </g>);
};

    <path d="M88,12 Q160,-6 235,12" fill="none" stroke={K.P} strokeWidth={5} strokeLinecap="round"/>

    <Arr pts={[[225,12],[185,2],[135,2],[95,12]]} c={K.R} lab="Ao→PA" lp={[160,-14]}/>
  </g>),

  coa: (post) => {
    const base = "M195,148 L195,42 Q195,28 210,22 L248,12 Q272,6 286,22 L298,52 L298,";
    return post ? (<g key="coa">
      <path d={base+"78 L298,125 L298,185"} fill="none" stroke={K.R} strokeWidth={7} strokeLinecap="round"/>
      <Tx x={256} y={14} t="Ao" c={K.R} s={10} b a="start"/>

      <path d="M298,112 L298,135 L298,185" fill="none" stroke={K.R} strokeWidth={7} strokeLinecap="round"/>
      <Tx x={256} y={14} t="Ao" c={K.R} s={10} b a="start"/>

  </g>) : (<g key="ebstein">
    <rect x={100} y={AV+32} width={40} height={6} fill="#c040a0"/>
    <Tx x={95} y={AV+50} t="TV↓" c="#c040a0" s={8} b a="end"/>
    <Tx x={120} y={AV+18} t="aRV" c="#c040a0" s={8} b/>
    <Tx x={120} y={AV+27} t="(atrialized)" c="#c040a0" s={6}/>

  tga: (post) => post ? (<g key="tga">

  tapvr: (post) => post ? (<g key="tapvr">

  avsd: (post) => post ? (<g key="avsd">

    <Tx x={SEP} y={107} t="P" c="#fff" s={7} b/>

    <rect x={133} y={93} width={54} height={79} fill="none" stroke="#d44" strokeWidth={2} strokeDasharray="4,2"/>
    <Tx x={SEP} y={128} t="Common" c="#d44" s={8} b/>

/* ═══════════════════════════════════════════════════════════
   CONFLICT RULES
   ═══════════════════════════════════════════════════════════ */
// AVSD already includes ASD+VSD concept; some combos are mutually exclusive
const CONFLICTS = {
  avsd: ["asd","vsd"], // AVSD subsumes ASD+VSD
};
function resolveConflicts(ids) {
  let s = new Set(ids);
  for (const [k, blocked] of Object.entries(CONFLICTS)) {
    if (s.has(k)) blocked.forEach(b => s.delete(b));
  }
  return s;
}

/* ═══════════════════════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════════════════════ */
const ff = "'IBM Plex Mono','SF Mono','Menlo',monospace";

function App() {
  const [active, setActive] = useState(new Set());
  const [post, setPost] = useState(false);
  const [view, setView] = useState("presets"); // presets | detail

  const toggle = useCallback((id) => {
    setActive(prev => {
      const n = new Set(prev);
      n.has(id) ? n.delete(id) : n.add(id);
      return resolveConflicts(n);
    });
  }, []);

  const loadPreset = useCallback((ids) => {
    if (ids === null) { setView("detail"); return; }
    setActive(resolveConflicts(ids));
    setPost(false);
    setView("detail");
  }, []);

  const clearAll = useCallback(() => { setActive(new Set()); setPost(false); }, []);

  const activeList = [...active];
  const isNormal = activeList.length === 0;

  /* ── PRESETS VIEW ── */
  if (view === "presets") return (
    <div style={{fontFamily:ff,minHeight:"100vh",background:"#f4f3f0",color:"#1a1a1a"}}>
      <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
      <div style={{background:"#1a1a1a",color:"#f4f3f0",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <h1 style={{margin:0,fontSize:16,fontWeight:700,letterSpacing:2}}>CHD ANATOMY ATLAS</h1>
          <div style={{fontSize:10,opacity:.5,letterSpacing:1,marginTop:2}}>COMPOSABLE MULTI-DEFECT · PATIENT EDUCATION</div>
        </div>
        <div style={{background:"#333",padding:"4px 12px",fontSize:9,fontWeight:600,letterSpacing:1.5}}>OFFLINE</div>
      </div>

      <div style={{padding:20,maxWidth:900,margin:"0 auto"}}>
        <div style={{fontSize:11,color:"#888",marginBottom:16,lineHeight:1.6}}>
          Choose a preset combination or build a custom one. Each condition is rendered as a layer on the same heart diagram.
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(190px, 1fr))",gap:8}}>
          {PRESETS.map((p,i) => {
            const isCustom = p.ids === null;
            return (
              <div key={i} onClick={() => loadPreset(p.ids)}
                style={{padding:"10px 12px",border:isCustom?"2px dashed #999":"2px solid #1a1a1a",cursor:"pointer",
                  background:"#fff",transition:"all .12s",position:"relative"}}
                onMouseEnter={e=>{e.currentTarget.style.background="#1a1a1a";e.currentTarget.style.color="#f4f3f0"}}
                onMouseLeave={e=>{e.currentTarget.style.background="#fff";e.currentTarget.style.color="#1a1a1a"}}>
                <div style={{fontSize:13,fontWeight:700}}>{p.label}</div>
                {p.ids && p.ids.length > 0 && (
                  <div style={{display:"flex",gap:4,marginTop:5,flexWrap:"wrap"}}>
                    {p.ids.map(id => (
                      <span key={id} style={{fontSize:8,fontWeight:700,padding:"2px 5px",background:DEFECTS[id]?.color||"#888",color:"#fff",letterSpacing:.5}}>
                        {DEFECTS[id]?.name || id}
                      </span>
                    ))}
                  </div>
                )}
                {p.desc && <div style={{fontSize:9,marginTop:4,opacity:.6}}>{p.desc}</div>}
                {p.ids?.length > 1 && <div style={{position:"absolute",top:6,right:8,fontSize:8,fontWeight:700,color:K.G,letterSpacing:.5}}>COMBO</div>}
              </div>
            );
          })}
        </div>
      </div>
      <div style={{textAlign:"center",fontSize:9,color:"#bbb",padding:"16px 20px",letterSpacing:1}}>
        FOR PATIENT EDUCATION · NOT A DIAGNOSTIC TOOL · SIMPLIFIED SCHEMATICS
      </div>
    </div>
  );

  /* ── DETAIL / BUILDER VIEW ── */
  return (
    <div style={{fontFamily:ff,minHeight:"100vh",background:"#f4f3f0",color:"#1a1a1a"}}>
      <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>

      {/* Header */}
      <div style={{background:"#1a1a1a",color:"#f4f3f0",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={()=>setView("presets")} style={{background:"none",border:"2px solid #555",color:"#f4f3f0",padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:ff,letterSpacing:1}}>←</button>
          <div>
            <div style={{fontSize:13,fontWeight:700,letterSpacing:1}}>
              {isNormal ? "NORMAL HEART" : activeList.map(id => DEFECTS[id]?.name).join(" + ")}
            </div>
            <div style={{fontSize:9,opacity:.5,letterSpacing:1}}>{activeList.length} condition{activeList.length!==1?"s":""} active</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {activeList.length > 0 && (
            <div style={{display:"flex",border:"2px solid #555"}}>
              {[false,true].map(v => (
                <button key={String(v)} onClick={()=>setPost(v)} style={{
                  padding:"4px 14px",border:"none",fontSize:10,fontWeight:700,
                  fontFamily:ff,cursor:"pointer",letterSpacing:1,
                  background:post===v?(v?K.G:"#d44"):"transparent",
                  color:post===v?"#fff":"#777",transition:"all .12s",
                }}>{v?"POST-OP":"PRE-OP"}</button>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Defect toggle bar */}
      <div style={{background:"#eae7e2",padding:"10px 16px",borderBottom:"2px solid #ccc"}}>
        <div style={{fontSize:9,fontWeight:700,letterSpacing:2,color:"#888",marginBottom:6}}>
          TOGGLE CONDITIONS — tap to add/remove
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          {DEFECT_IDS.map(id => {
            const d = DEFECTS[id];
            const on = active.has(id);
            return (
              <button key={id} onClick={() => toggle(id)}
                style={{
                  padding:"5px 10px",border:on?`2px solid ${d.color}`:"2px solid #bbb",
                  background:on?d.color:"#fff",color:on?"#fff":"#666",
                  fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:ff,
                  letterSpacing:.5,transition:"all .12s",opacity:on?1:.7,
                }}>
                {on?"✓ ":""}{d.name}
              </button>
            );
          })}
          <button onClick={clearAll} style={{padding:"5px 10px",border:"2px solid #aaa",background:"none",color:"#888",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:ff,letterSpacing:.5}}>
            CLEAR ALL
          </button>
        </div>
      </div>

      {/* Content */}
      <div style={{padding:14,maxWidth:960,margin:"0 auto",display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

        {/* Diagram */}
        <div style={{gridColumn:"1/-1",background:"#fff",border:"2px solid #1a1a1a",padding:14}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6,flexWrap:"wrap",gap:6}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:2,color:post?K.G:isNormal?K.B:"#d44",display:"flex",alignItems:"center",gap:6}}>
              <span style={{width:8,height:8,background:post?K.G:isNormal?K.B:"#d44",display:"inline-block"}}/>
              {isNormal?"NORMAL ANATOMY":post?"ALL REPAIRS SHOWN":"DEFECTS SHOWN"}
            </div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {[{c:K.B,l:"Deoxy"},{c:K.R,l:"Oxy"},{c:K.P,l:"Mixed/Shunt"},...(post?[{c:K.G,l:"Repair"}]:[])].map(x => (
                <div key={x.l} style={{display:"flex",alignItems:"center",gap:3,fontSize:8,color:"#888"}}>
                  <span style={{width:8,height:8,background:x.c,display:"inline-block"}}/>{x.l}
                </div>
              ))}
            </div>
          </div>
          <div style={{maxWidth:400,margin:"0 auto"}}>
            <svg viewBox="0 -25 340 310" style={{width:"100%"}}>
              <BaseHeart active={active} post={post}/>
              {activeList.map(id => layers[id] ? layers[id](post) : null)}
              {isNormal && (<>
                <Arr pts={[[48,98],[95,102],[118,132]]} c={K.B}/>
                <Arr pts={[[120,170],[125,AV],[125,45],[110,25]]} c={K.B}/>
                <Arr pts={[[272,95],[230,105],[205,130]]} c={K.R}/>
                <Arr pts={[[200,170],[195,AV],[195,45],[210,25]]} c={K.R}/>
              </>)}
            </svg>
          </div>
        </div>

        {/* Condition descriptions */}
        {isNormal ? (
          <div style={{gridColumn:"1/-1",background:"#fff",border:"2px solid #1a1a1a",padding:14}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:2,color:"#888",borderBottom:"2px solid #ddd",paddingBottom:5,marginBottom:8}}>NORMAL HEART</div>
            <p style={{margin:0,fontSize:11.5,lineHeight:1.85,color:"#333"}}>
              Four chambers work as a double pump. Right side sends blue blood to lungs (PA). Left side sends red blood to body (Ao). Septa and valves keep the two circuits separate.
            </p>
          </div>
        ) : (
          activeList.map(id => {
            const d = DEFECTS[id];
            return (
              <div key={id} style={{background:"#fff",border:`2px solid ${d.color}`,padding:14}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                  <span style={{fontSize:9,fontWeight:700,padding:"2px 6px",background:d.color,color:"#fff",letterSpacing:.5}}>{d.name}</span>
                  <span style={{fontSize:10,fontWeight:600,color:"#444"}}>{d.full}</span>
                </div>
                <p style={{margin:0,fontSize:11,lineHeight:1.8,color:"#444"}}>
                  {post ? <><strong style={{color:K.G}}>Surgery: </strong>{d.fix}</> : d.desc}
                </p>
              </div>
            );
          })
        )}

        {/* Combined summary when multiple */}
        {activeList.length > 1 && (
          <div style={{gridColumn:"1/-1",background:post?"#f0f8f0":"#fdf6ee",border:`2px solid ${post?K.G:"#c4956a"}`,padding:14}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:2,color:post?K.G:"#c4956a",borderBottom:`2px solid ${post?K.G:"#c4956a"}`,paddingBottom:5,marginBottom:8}}>
              {post?"COMBINED SURGICAL PLAN":"COMBINED EFFECT"}
            </div>
            <div style={{fontSize:11,lineHeight:1.8,color:"#333"}}>
              {post ? (
                <div>
                  This combination requires {activeList.length > 2 ? "multiple simultaneous repairs" : "combined repair"}:
                  {activeList.map((id,i) => (
                    <div key={id} style={{display:"flex",gap:6,alignItems:"flex-start",marginTop:6}}>
                      <span style={{minWidth:18,height:18,background:K.G,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,flexShrink:0}}>{i+1}</span>
                      <span><strong>{DEFECTS[id].name}:</strong> {DEFECTS[id].fix}</span>
                    </div>
                  ))}
                </div>
              ) : (
                <div>
                  This heart has <strong>{activeList.length} conditions</strong> present simultaneously:
                  {activeList.map((id,i) => (
                    <div key={id} style={{display:"flex",gap:6,alignItems:"flex-start",marginTop:6}}>
                      <span style={{minWidth:18,height:18,background:DEFECTS[id].color,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,flexShrink:0}}>{i+1}</span>
                      <span><strong>{DEFECTS[id].name}:</strong> {DEFECTS[id].desc}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* Abbreviations */}
        <div style={{gridColumn:"1/-1",background:"#fff",border:"2px solid #ddd",padding:12}}>
          <div style={{fontSize:9,fontWeight:700,letterSpacing:2,color:"#aaa",marginBottom:5}}>ABBREVIATIONS</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(150px, 1fr))",gap:"2px 14px",fontSize:10,color:"#666"}}>
            {[["RA","Right Atrium"],["LA","Left Atrium"],["RV","Right Ventricle"],["LV","Left Ventricle"],["PA","Pulmonary Artery"],["Ao","Aorta"],["PV","Pulmonary Veins"],["SVC","Sup. Vena Cava"],["IVC","Inf. Vena Cava"],["TV","Tricuspid Valve"],["MV","Mitral Valve"],["RVOT","RV Outflow Tract"],["AV","Atrioventricular"],["aRV","Atrialized RV"],["CoA","Coarctation"]].map(([a,f])=>(
              <div key={a}><strong style={{color:"#1a1a1a"}}>{a}</strong> — {f}</div>
            ))}
          </div>
        </div>
      </div>

      <div style={{textAlign:"center",fontSize:9,color:"#bbb",padding:"10px 20px",letterSpacing:1}}>
        CHD ANATOMY ATLAS · COMPOSABLE MULTI-DEFECT · FOR PATIENT EDUCATION
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
